title: HIOC Dashboard v2
views:
  - title: Executive
    path: hioc-v2-executive
    icon: mdi:monitor-dashboard
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Mission Status
            content: >-
              {% set incident = states('sensor.hioc_incident_status') %}
              {% set offline = states('sensor.hioc_inventory_offline_devices') | int(0) %}
              {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(0) %}
              {% set dns_rising = states('sensor.hioc_forecast_dns_trend') == 'rising' %}
              {% set pi4_memory_rising = states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}
              {% set pi4_temp_rising = states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' %}
              {% set packet_rising = states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}
              {% set watch_count = (1 if dns_rising else 0) + (1 if pi4_memory_rising else 0) + (1 if pi4_temp_rising else 0) + (1 if packet_rising else 0) %}
              {% if incident == 'active' %}
              # Critical

              What is happening: {{ states('sensor.hioc_incident_active') }} is active.

              Why it matters: {{ states('sensor.hioc_incident_system') }} may affect dependent services.

              Recommended action: Open Mission Control and follow the incident recommendation.

              Click path: Diagnostics.
              {% elif offline > 0 or degraded > 0 %}
              # Degraded

              What is happening: Inventory reports {{ degraded }} degraded and {{ offline }} offline devices.

              Why it matters: stale or offline devices can hide service dependency failures.

              Recommended action: Open Inventory and review unhealthy devices.

              Click path: Inventory.
              {% elif watch_count > 0 %}
              # Watch

              What is happening: {{ watch_count }} watch item{{ 's' if watch_count != 1 else '' }} detected.

              Why it matters: a rising trend can become an incident if it continues.

              Recommended action: no immediate action required; open the relevant investigation page if the trend persists.

              Click path: Domain Health or Top Risks.
              {% else %}
              # Operational

              What is happening: no active incident and no HIOC watch items are currently detected.

              Why it matters: monitored domains are below operational thresholds.

              Recommended action: no action required.

              Click path: Diagnostics if you want supporting evidence.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 5
            card_mod:
              style: |
                ha-card {
                  min-height: 315px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  border-left: 6px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 or states('sensor.hioc_inventory_offline_devices') | int(0) > 0 or states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %};
                  background: linear-gradient(135deg, rgba(10,24,39,.98), rgba(4,10,18,.98));
                  box-shadow: 0 18px 48px rgba(0,0,0,.36);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.36; }
                h1 {
                  color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 or states('sensor.hioc_inventory_offline_devices') | int(0) > 0 or states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %};
                  font-size: 30px;
                  margin: 0 0 12px 0;
                }

          - type: markdown
            title: Current Incident
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              # {{ states('sensor.hioc_incident_active') }}

              Phase: {{ state_attr('sensor.hioc_incident_active','phase') | default('active') | title }}

              Severity: {{ states('sensor.hioc_incident_severity') | title }}

              Root cause: {{ state_attr('sensor.hioc_incident_active','root_cause') | default('Not available') }}

              Confidence: {{ state_attr('sensor.hioc_incident_active','confidence_percent') | default(0) }}%

              Affected systems: {{ state_attr('sensor.hioc_incident_active','impact') | default('See affected systems') }}

              Recommended action: {{ states('sensor.hioc_incident_recommendation') }}

              Click path: Diagnostics.
              {% else %}
              # No Active Incident

              What is happening: HIOC is not reporting an active incident.

              Why it matters: Mission Control is available, but no response workflow is currently required.

              Recommended action: no action required.

              Click path: Diagnostics.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card {
                  min-height: 315px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  border-left: 6px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#22c55e{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.34; }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% else %}#86efac{% endif %}; font-size: 24px; }

          - type: markdown
            title: Affected Systems
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              {% set affected = state_attr('sensor.hioc_incident_active','affected') %}
              What is affected:

              {% if affected is iterable and affected is not string %}
              {% for item in affected %}
              - {{ item }}
              {% endfor %}
              {% else %}
              - {{ state_attr('sensor.hioc_incident_active','impact') | default('Affected systems are not available') }}
              {% endif %}

              Recommended action: open Diagnostics to inspect dependency path.

              Click path: Diagnostics.
              {% else %}
              # No Systems Currently Affected

              What is happening: no incident impact is reported.

              Why it matters: no dependent services require response right now.

              Recommended action: no action required.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card {
                  min-height: 280px;
                  border-radius: 16px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#38bdf8{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                h1 { color: #bae6fd; font-size: 22px; }
                ha-markdown { line-height: 1.34; }

          - type: vertical-stack
            title: Domain Health
            grid_options:
              columns: 8
            cards:
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: markdown
                    title: Incident
                    content: >-
                      {% if is_state('sensor.hioc_incident_status','active') %}
                      # Critical

                      Meaning: active incident requires investigation.

                      Action: open Mission Control.
                      {% else %}
                      # Healthy

                      Meaning: no active incident.

                      Action: no action required.
                      {% endif %}

                      Click: Diagnostics.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-diagnostics
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: Inventory
                    content: >-
                      {% set offline = states('sensor.hioc_inventory_offline_devices') | int(0) %}
                      {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(0) %}
                      {% if offline > 0 %}
                      # Critical

                      Meaning: {{ offline }} device{{ 's are' if offline != 1 else ' is' }} offline.

                      Action: review unhealthy devices.
                      {% elif degraded > 0 %}
                      # Watch

                      Meaning: {{ degraded }} device{{ 's are' if degraded != 1 else ' is' }} degraded.

                      Action: review inventory health.
                      {% else %}
                      # Healthy

                      Meaning: {{ states('sensor.hioc_inventory_device_count') }} devices and {{ states('sensor.hioc_inventory_service_count') }} services are known.

                      Action: no action required.
                      {% endif %}

                      Click: Inventory.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-inventory
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#ef4444{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#fecaca{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#fcd34d{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: Internet
                    content: >-
                      {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}
                      # Watch

                      Meaning: internet latency or packet loss trend is rising.

                      Action: open Network if this persists.
                      {% else %}
                      # Healthy

                      Meaning: internet latency and packet loss trends are stable.

                      Action: no action required.
                      {% endif %}

                      Click: Network.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-network
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: DNS
                    content: >-
                      {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}
                      # Watch

                      Meaning: DNS latency is increasing compared to recent baseline.

                      Action: open Network diagnostics if this persists.
                      {% else %}
                      # Healthy

                      Meaning: DNS forecast trend is not rising.

                      Action: no action required.
                      {% endif %}

                      Click: Network.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-network
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: MQTT
                    content: >-
                      {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}
                      # Watch

                      Meaning: MQTT publish timing trend is increasing.

                      Action: open Diagnostics and check telemetry path.
                      {% else %}
                      # Healthy

                      Meaning: MQTT trend is not rising.

                      Action: no action required.
                      {% endif %}

                      Click: Diagnostics.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-diagnostics
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: Pi4
                    content: >-
                      {% if states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' %}
                      # Watch

                      Meaning: Pi4 memory or temperature trend is rising.

                      Action: open Servers and review Pi4 health.
                      {% else %}
                      # Healthy

                      Meaning: Pi4 forecast trends do not require action.

                      Action: no action required.
                      {% endif %}

                      Click: Servers.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-servers
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: Platform
                    content: >-
                      {% if states('sensor.hioc_platform_status') == 'online' %}
                      # Healthy

                      Meaning: platform status publisher is online.

                      Action: no action required.
                      {% else %}
                      # Informational

                      Meaning: platform status is {{ states('sensor.hioc_platform_status') }}.

                      Action: open Servers or Diagnostics.
                      {% endif %}

                      Click: Servers.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-servers
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_platform_status') == 'online' %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_platform_status') == 'online' %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: vertical-stack
            title: Top Risks
            grid_options:
              columns: 6
            cards:
              - type: conditional
                conditions:
                  - entity: sensor.hioc_incident_status
                    state: active
                card:
                  type: markdown
                  title: Active Incident
                  content: >-
                    Severity: {{ states('sensor.hioc_incident_severity') | title }}

                    Meaning: {{ states('sensor.hioc_incident_active') }} may affect {{ states('sensor.hioc_incident_system') }}.

                    Recommended action: open Mission Control.

                    Click: Diagnostics.
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/hioc-v2-diagnostics
                  card_mod:
                    style: |
                      ha-card { border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #ef4444; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
              - type: conditional
                conditions:
                  - entity: sensor.hioc_forecast_dns_trend
                    state: rising
                card:
                  type: markdown
                  title: DNS Trend Rising
                  content: >-
                    Severity: Watch

                    Meaning: DNS latency is increasing compared to recent baseline.

                    Recommended action: open Network diagnostics if this persists.

                    Click: Network.
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/hioc-v2-network
                  card_mod:
                    style: |
                      ha-card { border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #f59e0b; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
              - type: conditional
                conditions:
                  - entity: sensor.hioc_forecast_pi4_memory_trend
                    state: rising
                card:
                  type: markdown
                  title: Pi4 Memory Rising
                  content: >-
                    Severity: Watch

                    Meaning: Pi4 memory usage is trending upward.

                    Recommended action: open Servers and review Pi4 health.

                    Click: Servers.
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/hioc-v2-servers
                  card_mod:
                    style: |
                      ha-card { border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #f59e0b; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
              - type: conditional
                conditions:
                  - entity: sensor.hioc_forecast_packet_loss_trend
                    state: rising
                card:
                  type: markdown
                  title: Packet Loss Rising
                  content: >-
                    Severity: Watch

                    Meaning: packet loss is increasing compared to recent baseline.

                    Recommended action: open Network diagnostics if this persists.

                    Click: Network.
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/hioc-v2-network
                  card_mod:
                    style: |
                      ha-card { border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #f59e0b; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
              - type: conditional
                conditions:
                  - entity: sensor.hioc_incident_status
                    state_not: active
                  - entity: sensor.hioc_forecast_dns_trend
                    state_not: rising
                  - entity: sensor.hioc_forecast_pi4_memory_trend
                    state_not: rising
                  - entity: sensor.hioc_forecast_packet_loss_trend
                    state_not: rising
                card:
                  type: markdown
                  title: No Current Action Required
                  content: >-
                    Severity: Healthy

                    Meaning: detected watch items are below operational thresholds.

                    Recommended action: continue monitoring.

                    Click: Operations for live state.
                  tap_action:
                    action: navigate
                    navigation_path: /lovelace/hioc-v2-operations
                  card_mod:
                    style: |
                      ha-card { border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #22c55e; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }

          - type: markdown
            title: Latest Events
            content: >-
              {% if states('sensor.hioc_latest_timeline_event') in ['unknown', 'unavailable', 'none', 'None', ''] %}
              # No Recent Event Recorded

              Meaning: no incident timeline event is currently available.

              Recommended action: no action required if platform status remains online.
              {% else %}
              # {{ states('sensor.hioc_latest_timeline_event') }}

              Meaning: latest HIOC timeline event from the incident system.

              Incident history: {{ states('sensor.hioc_incident_history_count') }} recorded incidents.

              Recommended action: open Diagnostics for timeline context.
              {% endif %}

              Click: Diagnostics.
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 265px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: #bae6fd; font-size: 21px; }

          - type: entities
            title: Data Freshness
            show_header_toggle: false
            entities:
              - entity: sensor.hioc_platform_status
                name: Platform
                icon: mdi:server-network
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-servers
              - entity: sensor.hioc_engine_status
                name: Incident Engine
                icon: mdi:alert-decagram
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-diagnostics
              - entity: sensor.hioc_history_engine_status
                name: History Engine
                icon: mdi:history
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-diagnostics
              - entity: sensor.hioc_inventory_status
                name: Inventory Engine
                icon: mdi:devices
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-inventory
              - entity: sensor.hioc_dashboard_version
                name: Dashboard
                icon: mdi:monitor-dashboard
              - entity: sensor.hioc_schema_version
                name: Schema
                icon: mdi:database-cog
              - entity: sensor.hioc_mqtt_api_version
                name: MQTT API
                icon: mdi:message-processing
              - entity: sensor.hioc_incident_updated
                name: Incident Updated
                icon: mdi:clock-check
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card {
                  min-height: 265px;
                  border-radius: 16px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid {% if states('sensor.hioc_platform_status') == 'online' %}#22c55e{% else %}#64748b{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  --primary-text-color: #dcecff;
                  --secondary-text-color: #93a4b8;
                  --paper-item-icon-color: #38bdf8;
                }

  - title: Operations
    path: hioc-v2-operations
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Live Operational State
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              # Critical

              What is happening: {{ states('sensor.hioc_incident_system') }} incident is active.

              Recommended action: open Mission Control.
              {% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}
              # Watch

              What is happening: one or more operational trends are rising.

              Recommended action: use the domain cards below to investigate only if the trend persists.
              {% else %}
              # Operational

              What is happening: no active incident reported by HIOC.

              Recommended action: no action required.
              {% endif %}
            grid_options:
              columns: 12
            card_mod:
              style: |
                ha-card { min-height: 150px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: linear-gradient(135deg, rgba(10,24,39,.98), rgba(4,10,18,.98)); color: #dcecff; box-shadow: 0 18px 48px rgba(0,0,0,.36); }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: markdown
            title: Incident
