title: HIOC Dashboard v2
views:
  - title: Executive
    path: hioc-v2-executive
    icon: mdi:monitor-dashboard
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Mission Status
            content: >-
              {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
              {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
              {% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
              {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
              {% set inventory_status = states('sensor.hioc_inventory_status') | lower | trim %}
              {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
              {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
              {% set inventory_watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
              {% set temperature_trend = states('sensor.hioc_forecast_pi4_temperature_trend') | lower | trim %}
              {% set packet_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}
              {% set dns_rising = states('sensor.hioc_forecast_dns_trend') == 'rising' %}
              {% set pi4_memory_rising = states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}
              {% set pi4_temp_rising = states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' %}
              {% set packet_rising = states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}
              {% set watch_count = (1 if dns_rising else 0) + (1 if pi4_memory_rising else 0) + (1 if pi4_temp_rising else 0) + (1 if packet_rising else 0) %}
              {% if incident == 'active' %}
              {% if severity == 'critical' %}
              # Critical

              {% set operator_guidance = 'Investigate now; immediate operator attention is required.' %}
              {% elif severity == 'major' %}
              # Major

              {% set operator_guidance = 'Investigate promptly and follow the incident recommendation.' %}
              {% elif severity == 'warning' %}
              # Warning

              {% set operator_guidance = 'Review the incident and monitor; follow the recommendation if it persists.' %}
              {% else %}
              # Unknown

              {% set operator_guidance = 'Severity unavailable; review incident details.' %}
              {% endif %}

              What is happening: {{ states('sensor.hioc_incident_active') }} is active.

              Why it matters: {{ states('sensor.hioc_incident_system') }} may affect dependent services.

              Recommended action: {{ operator_guidance }}

              Click path: Diagnostics.
              {% elif incident not in ['none', 'resolved'] %}
              # Unknown

              What is happening: incident status is unavailable.

              Why it matters: HIOC cannot confirm whether an incident is active.

              Recommended action: review Diagnostics for current engine state.

              Click path: Diagnostics.
              {% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}
              # Unknown

              What is happening: inventory status or counts are unavailable.

              Why it matters: HIOC cannot confirm the inventory portion of mission state.

              Recommended action: review Inventory for current authoritative state.

              Click path: Inventory.
              {% elif offline > 0 or degraded > 0 %}
              # Degraded

              What is happening: Inventory reports {{ degraded }} degraded and {{ offline }} offline devices.

              Why it matters: stale or offline devices can hide service dependency failures.

              Recommended action: Open Inventory and review unhealthy devices.

              Click path: Inventory.
              {% elif inventory_watch > 0 %}
              # Observation

              What is happening: {{ states('sensor.hioc_inventory_operations_summary') }}.

              Why it matters: passive stale observations remain visible without representing monitored-device failure.

              Recommended action: {{ states('sensor.hioc_inventory_recommended_action') }}

              Click path: Inventory.
              {% elif watch_count > 0 %}
              # Watch

              What is happening: {{ watch_count }} watch item{{ 's' if watch_count != 1 else '' }} detected.

              Why it matters: a rising trend can become an incident if it continues.

              Recommended action: no immediate action required; open the relevant investigation page if the trend persists.

              Click path: Domain Health or Top Risks.
              {% elif dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] and temperature_trend in ['stable', 'falling'] and packet_trend in ['stable', 'falling'] %}
              # Operational

              What is happening: no active incident and no HIOC watch items are currently detected.

              Why it matters: monitored domains are below operational thresholds.

              Recommended action: no action required.

              Click path: Diagnostics if you want supporting evidence.
              {% else %}
              # Unknown

              What is happening: one or more forecast states are unavailable or unrecognized.

              Why it matters: HIOC cannot confirm the all-clear forecast state.

              Recommended action: review Diagnostics for current forecast state.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                ha-card {
                  min-height: 315px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                  {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                  {% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
                  {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
                  {% set temperature_trend = states('sensor.hioc_forecast_pi4_temperature_trend') | lower | trim %}
                  {% set packet_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}
                  {% set inventory_status = states('sensor.hioc_inventory_status') | lower | trim %}
                  {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
                  {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
                  {% set inventory_watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
                  {% set forecast_known = dns_trend in ['stable', 'falling', 'rising'] and memory_trend in ['stable', 'falling', 'rising'] and temperature_trend in ['stable', 'falling', 'rising'] and packet_trend in ['stable', 'falling', 'rising'] %}
                  border-left: 6px solid {% if incident == 'active' and severity == 'critical' %}#ef4444{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#f59e0b{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#64748b{% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}#64748b{% elif offline > 0 or degraded > 0 or dns_trend == 'rising' or memory_trend == 'rising' or temperature_trend == 'rising' or packet_trend == 'rising' %}#f59e0b{% elif inventory_watch > 0 %}#38bdf8{% elif forecast_known %}#22c55e{% else %}#64748b{% endif %};
                  background: linear-gradient(135deg, rgba(10,24,39,.98), rgba(4,10,18,.98));
                  box-shadow: 0 18px 48px rgba(0,0,0,.36);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.36; }
                h1 {
                  color: {% if incident == 'active' and severity == 'critical' %}#fecaca{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#fcd34d{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#cbd5e1{% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}#cbd5e1{% elif offline > 0 or degraded > 0 or dns_trend == 'rising' or memory_trend == 'rising' or temperature_trend == 'rising' or packet_trend == 'rising' %}#fcd34d{% elif inventory_watch > 0 %}#7dd3fc{% elif forecast_known %}#86efac{% else %}#cbd5e1{% endif %};
                  font-size: 30px;
                  margin: 0 0 12px 0;
                }

          - type: markdown
            title: Current Incident
            content: >-
              {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
              {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
              {% set severity_label = severity | title if severity in ['warning', 'major', 'critical'] else 'Unknown' %}
              {% if incident == 'active' %}
              # {{ states('sensor.hioc_incident_active') }}

              Phase: {{ state_attr('sensor.hioc_incident_active','phase') | default('unknown', true) | title }}

              Severity: {{ severity_label }}

              Root cause: {{ state_attr('sensor.hioc_incident_active','root_cause') | default('Unknown', true) }}

              {% set confidence = state_attr('sensor.hioc_incident_active','confidence_percent') | default('unknown', true) %}
              Confidence: {{ confidence }}{{ '%' if confidence is number else '' }}

              Affected systems: {{ state_attr('sensor.hioc_incident_active','impact') | default('See affected systems') }}

              Recommended action: {{ states('sensor.hioc_incident_recommendation') }}

              Click path: Diagnostics.
              {% elif incident in ['none', 'resolved'] %}
              # No Active Incident

              What is happening: HIOC is not reporting an active incident.

              Why it matters: Mission Control is available, but no response workflow is currently required.

              Recommended action: no action required.

              Click path: Diagnostics.
              {% else %}
              # Unknown

              What is happening: incident status is unavailable.

              Why it matters: HIOC cannot confirm whether an incident is active.

              Recommended action: review Diagnostics for current engine state.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                ha-card {
                  min-height: 315px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                  {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                  border-left: 6px solid {% if incident == 'active' and severity == 'critical' %}#ef4444{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#f59e0b{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#64748b{% else %}#22c55e{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.34; }
                h1 { color: {% if incident == 'active' and severity == 'critical' %}#fecaca{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#fcd34d{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#cbd5e1{% else %}#86efac{% endif %}; font-size: 24px; }

          - type: markdown
            title: Affected Systems
            content: >-
              {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
              {% if incident == 'active' %}
              {% set affected = state_attr('sensor.hioc_incident_active','affected') %}
              What is affected:

              {% if affected is iterable and affected is not string %}
              {% for item in affected %}
              - {{ item }}
              {% endfor %}
              {% else %}
              - {{ state_attr('sensor.hioc_incident_active','impact') | default('Affected systems are not available') }}
              {% endif %}

              Recommended action: open Diagnostics to inspect dependency path.

              Click path: Diagnostics.
              {% elif incident in ['none', 'resolved'] %}
              # No Systems Currently Affected

              What is happening: no incident impact is reported.

              Why it matters: no dependent services require response right now.

              Recommended action: no action required.
              {% else %}
              # Unknown

              Incident status is unavailable; affected systems cannot be confirmed.

              Recommended action: review Diagnostics for current engine state.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /lovelace/hioc-v2-diagnostics
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                ha-card {
                  min-height: 280px;
                  border-radius: 16px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                  {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                  border-left: 5px solid {% if incident == 'active' and severity == 'critical' %}#ef4444{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#f59e0b{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#64748b{% else %}#38bdf8{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                h1 { color: #bae6fd; font-size: 22px; }
                ha-markdown { line-height: 1.34; }

          - type: vertical-stack
            title: Domain Health
            grid_options:
              columns: 21
              rows: auto
            cards:
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: markdown
                    title: Incident
                    content: >-
                      {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                      {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                      {% if incident == 'active' %}
                      {% if severity == 'critical' %}
                      # Critical

                      Investigate now; immediate operator attention is required.
                      {% elif severity == 'major' %}
                      # Major

                      Investigate promptly and follow the incident recommendation.
                      {% elif severity == 'warning' %}
                      # Warning

                      Review the incident and monitor; follow the recommendation if it persists.
                      {% else %}
                      # Unknown

                      Severity unavailable; review incident details.
                      {% endif %}

                      Meaning: active incident requires investigation.

                      Action: open Mission Control.
                      {% elif incident in ['none', 'resolved'] %}
                      # Healthy

                      Meaning: no active incident.

                      Action: no action required.
                      {% else %}
                      # Unknown

                      Meaning: incident status is unavailable.

                      Action: review Mission Control.
                      {% endif %}

                      Click: Diagnostics.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-diagnostics
                    card_mod:
                      style: |
                        {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                        {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if incident == 'active' and severity == 'critical' %}#ef4444{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#f59e0b{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#64748b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if incident == 'active' and severity == 'critical' %}#fecaca{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#fcd34d{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#cbd5e1{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: Inventory
                    content: >-
                      {% set status = states('sensor.hioc_inventory_status') | lower | trim %}
                      {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
                      {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
                      {% set watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
                      {% if status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or watch < 0 %}
                      # Unknown

                      Meaning: inventory status or counts are unavailable.

                      Action: review Inventory evidence.
                      {% elif offline > 0 %}
                      # Critical

                      Meaning: {{ offline }} device{{ 's are' if offline != 1 else ' is' }} offline.

                      Action: review unhealthy devices.
                      {% elif degraded > 0 %}
                      # Watch

                      Meaning: {{ degraded }} device{{ 's are' if degraded != 1 else ' is' }} degraded.

                      Action: review inventory health.
                      {% elif watch > 0 %}
                      # Observation

                      Meaning: {{ states('sensor.hioc_inventory_operations_summary') }}.

                      Action: {{ states('sensor.hioc_inventory_recommended_action') }}
                      {% else %}
                      # Healthy

                      Meaning: {{ states('sensor.hioc_inventory_device_count') }} devices and {{ states('sensor.hioc_inventory_service_count') }} services are known.

                      Action: no action required.
                      {% endif %}

                      Click: Inventory.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-inventory
                    card_mod:
                      style: |
                        {% set status = states('sensor.hioc_inventory_status') | lower | trim %}
                        {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
                        {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
                        {% set watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or watch < 0 %}#64748b{% elif offline > 0 %}#ef4444{% elif degraded > 0 %}#f59e0b{% elif watch > 0 %}#38bdf8{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or watch < 0 %}#cbd5e1{% elif offline > 0 %}#fecaca{% elif degraded > 0 %}#fcd34d{% elif watch > 0 %}#7dd3fc{% else %}#86efac{% endif %}; }
                  - type: markdown
                    title: Internet
                    content: >-
                      {% set latency_trend = states('sensor.hioc_forecast_internet_latency_trend') | lower | trim %}
                      {% set loss_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}
                      {% if latency_trend == 'rising' or loss_trend == 'rising' %}
                      # Watch

                      Meaning: internet latency or packet loss trend is rising.

                      Action: open Network if this persists.
                      {% elif latency_trend in ['stable', 'falling'] and loss_trend in ['stable', 'falling'] %}
                      # Healthy

                      Meaning: internet latency and packet loss trends are stable.

                      Action: no action required.
                      {% else %}
                      # Unknown

                      Meaning: internet forecast state is unavailable.

                      Action: review Network evidence.
                      {% endif %}

                      Click: Network.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-network
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% set latency_trend = states('sensor.hioc_forecast_internet_latency_trend') | lower | trim %}{% set loss_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}{% if latency_trend == 'rising' or loss_trend == 'rising' %}#f59e0b{% elif latency_trend in ['stable', 'falling'] and loss_trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if latency_trend == 'rising' or loss_trend == 'rising' %}#fcd34d{% elif latency_trend in ['stable', 'falling'] and loss_trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }
                  - type: markdown
                    title: DNS
                    content: >-
                      {% set trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
                      {% if trend == 'rising' %}
                      # Watch

                      Meaning: DNS latency is increasing compared to recent baseline.

                      Action: open Network diagnostics if this persists.
                      {% elif trend in ['stable', 'falling'] %}
                      # Healthy

                      Meaning: DNS forecast trend is not rising.

                      Action: no action required.
                      {% else %}
                      # Unknown

                      Meaning: DNS forecast state is unavailable.

                      Action: review Network evidence.
                      {% endif %}

                      Click: Network.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-network
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% set trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}{% if trend == 'rising' %}#f59e0b{% elif trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if trend == 'rising' %}#fcd34d{% elif trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }
                  - type: markdown
                    title: MQTT
                    content: >-
                      {% set trend = states('sensor.hioc_forecast_mqtt_trend') | lower | trim %}
                      {% if trend == 'rising' %}
                      # Watch

                      Meaning: MQTT publish timing trend is increasing.

                      Action: open Diagnostics and check telemetry path.
                      {% elif trend in ['stable', 'falling'] %}
                      # Healthy

                      Meaning: MQTT trend is not rising.

                      Action: no action required.
                      {% else %}
                      # Unknown

                      Meaning: MQTT forecast state is unavailable.

                      Action: review Diagnostics evidence.
                      {% endif %}

                      Click: Diagnostics.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-diagnostics
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% set trend = states('sensor.hioc_forecast_mqtt_trend') | lower | trim %}{% if trend == 'rising' %}#f59e0b{% elif trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if trend == 'rising' %}#fcd34d{% elif trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }
                  - type: markdown
                    title: Pi4
                    content: >-
                      {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
                      {% set temperature_trend = states('sensor.hioc_forecast_pi4_temperature_trend') | lower | trim %}
                      {% if memory_trend == 'rising' or temperature_trend == 'rising' %}
                      # Watch

                      Meaning: Pi4 memory or temperature trend is rising.

                      Action: open Servers and review Pi4 health.
                      {% elif memory_trend in ['stable', 'falling'] and temperature_trend in ['stable', 'falling'] %}
                      # Healthy

                      Meaning: Pi4 forecast trends do not require action.

                      Action: no action required.
                      {% else %}
                      # Unknown

                      Meaning: Pi4 forecast state is unavailable.

                      Action: review Servers evidence.
                      {% endif %}

                      Click: Servers.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-servers
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}{% set temperature_trend = states('sensor.hioc_forecast_pi4_temperature_trend') | lower | trim %}{% if memory_trend == 'rising' or temperature_trend == 'rising' %}#f59e0b{% elif memory_trend in ['stable', 'falling'] and temperature_trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if memory_trend == 'rising' or temperature_trend == 'rising' %}#fcd34d{% elif memory_trend in ['stable', 'falling'] and temperature_trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }
                  - type: markdown
                    title: Platform
                    content: >-
                      {% if states('sensor.hioc_platform_status') == 'online' %}
                      # Healthy

                      Meaning: platform status publisher is online.

                      Action: no action required.
                      {% else %}
                      # Informational

                      Meaning: platform status is {{ states('sensor.hioc_platform_status') }}.

                      Action: open Servers or Diagnostics.
                      {% endif %}

                      Click: Servers.
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/hioc-v2-servers
                    card_mod:
                      style: |
                        ha-card { min-height: 155px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_platform_status') == 'online' %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
                        h1 { font-size: 21px; color: {% if states('sensor.hioc_platform_status') == 'online' %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: vertical-stack
            title: Top Risks
            grid_options:
              columns: 24
              rows: auto
            cards:
              - type: conditional
                conditions:
                  - entity: sensor.hioc_incident_status
                    state: active
                card:
                  type: markdown
                  title: Active Incident
                  content: >-
                    {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                    {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
