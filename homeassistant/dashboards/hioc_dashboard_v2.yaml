                h1 { color: {% if incident == 'active' and severity == 'critical' %}#fecaca{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#fcd34d{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#cbd5e1{% elif dns_trend == 'rising' or memory_trend == 'rising' %}#fcd34d{% elif dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: markdown
            title: Recommended Action
            content: >-
              {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
              {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
              {% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
              {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
              {% set inventory_status = states('sensor.hioc_inventory_status') | lower | trim %}
              {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
              {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
              {% set inventory_watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
              {% if incident == 'active' %}
              {% if severity == 'critical' %}
              # Investigate Now

              {% set operator_guidance = 'Investigate now; immediate operator attention is required.' %}
              {% elif severity == 'major' %}
              # Investigate Promptly

              {% set operator_guidance = 'Investigate promptly and follow the incident recommendation.' %}
              {% elif severity == 'warning' %}
              # Review Incident

              {% set operator_guidance = 'Review the incident and monitor; follow the recommendation if it persists.' %}
              {% else %}
              # Severity Unknown

              {% set operator_guidance = 'Severity unavailable; review incident details.' %}
              {% endif %}

              Action: {{ states('sensor.hioc_incident_recommendation') }}

              Operator guidance: {{ operator_guidance }}

              Why: HIOC correlated an active incident with probable root cause {{ state_attr('sensor.hioc_incident_active','root_cause') | default('Unknown', true) }}.
              {% elif incident not in ['none', 'resolved'] %}
              # Status Unknown

              Action: review current incident engine state.

              Why: incident status is unavailable.
              {% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}
              # Inventory Status Unknown

              Action: {{ states('sensor.hioc_inventory_recommended_action') }}

              Why: inventory status or counts are unavailable.
              {% elif offline > 0 or degraded > 0 or inventory_watch > 0 %}
              # Inventory

              Action: {{ states('sensor.hioc_inventory_recommended_action') }}

              Why: {{ states('sensor.hioc_inventory_operations_summary') }}.
              {% elif dns_trend == 'rising' %}
              # Review DNS If Trend Persists

              Action: open Network diagnostics and check DNS trend.

              Why: DNS latency is increasing compared to recent baseline.
              {% elif memory_trend == 'rising' %}
              # Check Pi4 Memory

              Action: open Servers and review Pi4 health.

              Why: memory usage is trending upward.
              {% elif dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] %}
              # No Action Required

              Action: continue monitoring.

              Why: no active incident or significant watch item is detected.
              {% else %}
              # Status Unknown

              Action: review current forecast engine state.

              Why: one or more forecast states are unavailable or unrecognized.
              {% endif %}
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                {% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
                {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
                {% set inventory_status = states('sensor.hioc_inventory_status') | lower | trim %}
                {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
                {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
                {% set inventory_watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
                ha-card { min-height: 310px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if incident == 'active' and severity == 'critical' %}#ef4444{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#f59e0b{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#64748b{% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}#64748b{% elif offline > 0 or degraded > 0 or dns_trend == 'rising' or memory_trend == 'rising' %}#f59e0b{% elif inventory_watch > 0 %}#38bdf8{% elif dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if incident == 'active' and severity == 'critical' %}#fecaca{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#fcd34d{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#cbd5e1{% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}#cbd5e1{% elif offline > 0 or degraded > 0 or dns_trend == 'rising' or memory_trend == 'rising' %}#fcd34d{% elif inventory_watch > 0 %}#7dd3fc{% elif dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: markdown
            title: Evidence
            content: >-
              {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
              {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
              {% set evidence = state_attr('sensor.hioc_incident_active','evidence') %}
              {% if incident == 'active' and evidence is iterable and evidence is not string %}
              {% for item in evidence %}
              - {{ item }}
              {% endfor %}
              {% elif incident == 'active' %}
              - {{ states('sensor.hioc_incident_reason') }}
              {% elif incident not in ['none', 'resolved'] %}
              - Incident status is unavailable; evidence cannot be scoped safely.
              {% else %}
              - Internet latency trend: {{ states('sensor.hioc_forecast_internet_latency_trend') | title }}
              - Packet loss trend: {{ states('sensor.hioc_forecast_packet_loss_trend') | title }}
              - DNS trend: {{ states('sensor.hioc_forecast_dns_trend') | title }}
              - MQTT trend: {{ states('sensor.hioc_forecast_mqtt_trend') | title }}
              - Pi4 memory trend: {{ states('sensor.hioc_forecast_pi4_memory_trend') | title }}
              {% endif %}
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                ha-card { min-height: 250px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if incident == 'active' and severity == 'critical' %}#ef4444{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#f59e0b{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#64748b{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' or states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#f59e0b{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: markdown
            title: Dependency Path
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              {% set affected = state_attr('sensor.hioc_incident_active','affected') %}
              {% if affected is iterable and affected is not string %}
              Likely affected chain:

              {% for item in affected %}
              - {{ item }}
              {% endfor %}
              {% else %}
              {{ state_attr('sensor.hioc_incident_active','impact') | default('Dependency path is not available') }}
              {% endif %}
              {% elif states('sensor.hioc_incident_status') in ['none', 'resolved'] %}
              No active dependency path.
              {% else %}
              Dependency path unavailable because incident status is unknown.
              {% endif %}
