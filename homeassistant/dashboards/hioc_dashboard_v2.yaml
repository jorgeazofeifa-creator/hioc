              Confidence: {{ confidence }}{{ '%' if confidence is number else '' }}

              Recovery: {{ review.recovery | default('Recovery details are not available.', true) }}

              Recovery type: {{ review.recovery_type | default('unknown', true) | title }}

              Impact summary: {{ review.impact_summary | default('Impact summary is not available.', true) }}

              Affected systems:

              {% set affected = review.affected_systems | default(none) %}
              {% if affected is iterable and affected is not string and affected | count > 0 %}
              {% for item in affected %}
              - {{ item }}
              {% endfor %}
              {% elif affected is iterable and affected is not string %}
              - No affected systems recorded.
              {% else %}
              - Affected systems state is unavailable.
              {% endif %}

              Affected services:

              {% set services = review.affected_services | default(none) %}
              {% if services is iterable and services is not string and services | count > 0 %}
              {% for item in services %}
              - {{ item }}
              {% endfor %}
              {% elif services is iterable and services is not string %}
              - No affected services recorded.
              {% else %}
              - Affected services state is unavailable.
              {% endif %}

              Evidence:

              {% set evidence = review.evidence | default(none) %}
              {% if evidence is iterable and evidence is not string and evidence | count > 0 %}
              {% for item in evidence %}
              - {{ item }}
              {% endfor %}
              {% elif evidence is iterable and evidence is not string %}
              - Evidence was not recorded for this incident.
              {% else %}
              - Evidence state is unavailable.
              {% endif %}

              Event log:

              {% set events = review.timeline | default(none) %}
              {% if events is iterable and events is not string and events | count > 0 %}
              {% for event in events %}
              - {{ event.timestamp | default('Time not available') }}: {{ event.message | default('Incident event') }}
              {% endfor %}
              {% elif events is iterable and events is not string %}
              - Timeline was not recorded for this incident.
              {% else %}
              - Timeline state is unavailable.
              {% endif %}

              Recommended action: {{ review.recommended_action | default('Recommendation unavailable.', true) }}

              Incident ID: {{ review.incident_id | default('Not available', true) }}
              {% else %}
              No completed incident review is available yet.
              {% endif %}
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                ha-card { min-height: 310px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: #bae6fd; font-size: 21px; }

          - type: entities
