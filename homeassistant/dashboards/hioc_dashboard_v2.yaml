                {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
                {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
                {% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
                {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
