                h1 { color: {% if incident == 'active' and severity == 'critical' %}#fecaca{% elif incident == 'active' and severity == 'major' %}var(--deep-orange-color){% elif incident == 'active' and severity == 'warning' %}#fcd34d{% elif incident == 'active' or incident not in ['none', 'resolved'] %}#cbd5e1{% elif inventory_status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or inventory_watch < 0 %}#cbd5e1{% elif offline > 0 or degraded > 0 or dns_trend == 'rising' or memory_trend == 'rising' %}#fcd34d{% elif inventory_watch > 0 %}#7dd3fc{% elif dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: markdown
