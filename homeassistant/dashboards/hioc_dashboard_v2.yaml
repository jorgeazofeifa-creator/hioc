  - title: Inventory
    path: hioc-v2-inventory
    icon: mdi:devices
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Inventory Summary
            content: >-
              {% set summary_infra = state_attr('sensor.hioc_inventory_device_count', 'infrastructure_count') | default('unknown', true) %}
              {% set summary_clients = state_attr('sensor.hioc_inventory_device_count', 'client_count') | default(state_attr('sensor.hioc_inventory_device_count', 'network_client_count'), true) | default('unknown', true) %}
              {% set discovery_sources = state_attr('sensor.hioc_inventory_device_count', 'discovery_sources') %}
              {% set discovery_limited = state_attr('sensor.hioc_inventory_device_count', 'discovery_limited') | default(false, true) %}
              {% set discovery_reason = state_attr('sensor.hioc_inventory_device_count', 'discovery_limit_reason') | default('', true) %}
              {% set devices = state_attr('sensor.hioc_inventory_devices', 'devices') %}
              {% set services = state_attr('sensor.hioc_inventory_services', 'services') %}
              # {{ states('sensor.hioc_inventory_operations_summary') }}

              Infrastructure devices: {{ summary_infra }}

              Network clients: {{ summary_clients }}

              Services: {{ states('sensor.hioc_inventory_service_count') }}

              Healthy: {{ states('sensor.hioc_inventory_healthy_devices') }}

              Watch: {{ states('sensor.hioc_inventory_watch_devices') }}

              Degraded: {{ states('sensor.hioc_inventory_degraded_devices') }}

              Offline: {{ states('sensor.hioc_inventory_offline_devices') }}

              Discovery sources:

              {% if discovery_sources is iterable and discovery_sources is not string %}
              {% for source in discovery_sources %}
              - {{ source }}
              {% endfor %}
              {% else %}
              - Discovery source details are not available yet.
              {% endif %}

              {% if discovery_limited %}
              Discovery is limited: {{ discovery_reason | default('A passive discovery source is unavailable.', true) }}
              {% endif %}

              Infrastructure discovered:

              {% if devices is iterable and devices is not string %}
              {% for device in devices if device.get('inventory_class', 'client') == 'infrastructure' %}
              - {{ device.get('display_name') or device.get('name') or 'Unknown device' }} - {{ device.get('ip') or 'No IP' }} - {{ device.get('role') or 'Unknown' }} - {{ (device.get('health_status') or device.get('health') or 'unknown') | title }}
              {% else %}
              - No infrastructure devices have been classified yet.
              {% endfor %}
              {% else %}
              - Inventory device attributes have not arrived.
              {% endif %}

              Services discovered:

              {% if services is iterable and services is not string %}
              {% for service in services %}
              - {{ service.get('name') or 'Unknown service' }} - {{ service.get('host') or service.get('device_id') or 'Unknown host' }} - {{ (service.get('type') or 'service') | title }} - {{ (service.get('status') or 'unknown') | title }}
              {% else %}
              - No services have been discovered yet.
              {% endfor %}
              {% else %}
              - Inventory service attributes have not arrived.
              {% endif %}

              What is unhealthy: {{ states('sensor.hioc_inventory_degraded_devices') }} degraded and {{ states('sensor.hioc_inventory_offline_devices') }} offline devices.

              Recommended action: {{ states('sensor.hioc_inventory_recommended_action') }}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
                {% set status = states('sensor.hioc_inventory_status') | lower | trim %}
                {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
                {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
                {% set watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
                ha-card { min-height: 230px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if offline > 0 %}#ef4444{% elif degraded > 0 %}#f59e0b{% elif status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or watch < 0 %}#64748b{% elif watch > 0 %}#38bdf8{% else %}#22c55e{% endif %}; background: linear-gradient(135deg, rgba(13,29,46,.98), rgba(5,11,20,.98)); color: #dcecff; box-shadow: 0 18px 48px rgba(0,0,0,.36); }
                h1 { color: {% if offline > 0 %}#fecaca{% elif degraded > 0 %}#fcd34d{% elif status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or watch < 0 %}#cbd5e1{% elif watch > 0 %}#7dd3fc{% else %}#86efac{% endif %}; }

          - type: markdown
            title: Counts
            content: >-
              {% set summary_infra = state_attr('sensor.hioc_inventory_device_count', 'infrastructure_count') | default('unknown', true) %}
              {% set summary_clients = state_attr('sensor.hioc_inventory_device_count', 'client_count') | default(state_attr('sensor.hioc_inventory_device_count', 'network_client_count'), true) | default('unknown', true) %}
              {% set discovery_sources = state_attr('sensor.hioc_inventory_device_count', 'discovery_sources') %}
              **Coverage**

              Infrastructure: {{ summary_infra }}

              Clients: {{ summary_clients }}

              Services: {{ states('sensor.hioc_inventory_service_count') }}

              Topology links: {{ states('sensor.hioc_inventory_topology_edges') }}

              Dependencies: {{ states('sensor.hioc_inventory_dependency_edges') }}

              Discovery sources:

              {% if discovery_sources is iterable and discovery_sources is not string %}
              {% for source in discovery_sources %}
              - {{ source }}
              {% endfor %}
              {% else %}
              - Not available yet
              {% endif %}

              **Health**

              Healthy: {{ states('sensor.hioc_inventory_healthy_devices') }}

              Watch: {{ states('sensor.hioc_inventory_watch_devices') }}

              Degraded: {{ states('sensor.hioc_inventory_degraded_devices') }}

              Offline: {{ states('sensor.hioc_inventory_offline_devices') }}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
                ha-card { min-height: 300px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                strong { color: #bfdbfe; }

          - type: markdown
            title: Inventory Explorer - Devices
            content: >-
              {% set devices = state_attr('sensor.hioc_inventory_devices', 'devices') %}
              {% if devices is iterable and devices is not string %}
              {% for device in devices %}
              **{{ device.get('display_name') or device.get('name') or 'Unknown device' }}**

              {% set health_score = device.get('health_score') | default('unknown', true) %}
              {{ device.get('role') or 'Unknown' }} - {{ (device.get('status') or device.get('health_status') or 'unknown') | title }} - {{ health_score }}{{ '%' if health_score is number else '' }}

              IP: {{ device.get('ip') or 'No IP reported' }}

              MAC: {{ device.get('mac') or 'Not observed' }}

              Vendor: {{ device.get('vendor') or 'Not available' }}

              Last seen: {{ device.get('last_seen') or 'Not available' }}

              Source: {{ device.get('source') or 'unknown' }}

              {% endfor %}
              {% else %}
              Inventory device attributes have not arrived.
              {% endif %}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
                ha-card { min-height: 500px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #60a5fa; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.24; }
                strong { color: #bfdbfe; }

          - type: markdown
            title: Inventory Explorer - Services
            content: >-
              {% set services = state_attr('sensor.hioc_inventory_services', 'services') %}
              {% if services is iterable and services is not string %}
              {% for service in services %}
              **{{ service.get('name') or 'Unknown service' }}**

              Host: {{ service.get('host') or service.get('device_id') or 'Unknown host' }}

              Type: {{ (service.get('type') or 'service') | title }} - Status: {{ (service.get('status') or 'unknown') | title }}

              Dependency: {{ service.get('dependency') or 'None recorded' }}

              {% endfor %}
              {% else %}
              Inventory service attributes have not arrived.
              {% endif %}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
                ha-card { min-height: 500px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.24; }
                strong { color: #bfdbfe; }
    theme: HIOC Operations
    cards: []

  - title: Network
    path: hioc-v2-network
    icon: mdi:web-check
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Network Health
            content: >-
              {% set latency_trend = states('sensor.hioc_forecast_internet_latency_trend') | lower | trim %}
              {% set loss_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}
              {% if latency_trend == 'rising' or loss_trend == 'rising' %}
              # Watch

              Internet latency or packet loss is trending upward.

              Current risk: Watch.

              Recommended action: continue monitoring and open Diagnostics if the trend persists.
              {% elif latency_trend in ['stable', 'falling'] and loss_trend in ['stable', 'falling'] %}
              # Healthy

              Internet latency and packet loss are stable.

              Current risk: Healthy.

              Recommended action: no action required.
              {% else %}
              # Unknown

              Forecast state is unavailable or unrecognized.

              Recommended action: review Diagnostics for current forecast state.
              {% endif %}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% set latency_trend = states('sensor.hioc_forecast_internet_latency_trend') | lower | trim %}{% set loss_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}{% if latency_trend == 'rising' or loss_trend == 'rising' %}#f59e0b{% elif latency_trend in ['stable', 'falling'] and loss_trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: linear-gradient(135deg, rgba(13,29,46,.98), rgba(5,11,20,.98)); color: #dcecff; box-shadow: 0 18px 48px rgba(0,0,0,.36); }
                h1 { color: {% if latency_trend == 'rising' or loss_trend == 'rising' %}#fcd34d{% elif latency_trend in ['stable', 'falling'] and loss_trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: markdown
            title: DNS Investigation
            content: >-
              {% set trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
              {% if trend == 'rising' %}
              # Watch

              DNS trend is rising.

              Meaning: DNS latency is increasing compared to recent baseline.

              Recommended action: review DNS diagnostics if this persists.
              {% elif trend in ['stable', 'falling'] %}
              # Healthy

              DNS forecast trend is not rising.

              Recommended action: no action required.
              {% else %}
              # Unknown

              DNS forecast state is unavailable or unrecognized.

              Recommended action: review Diagnostics for current forecast state.
              {% endif %}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% set trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}{% if trend == 'rising' %}#f59e0b{% elif trend in ['stable', 'falling'] %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if trend == 'rising' %}#fcd34d{% elif trend in ['stable', 'falling'] %}#86efac{% else %}#cbd5e1{% endif %}; }

          - type: markdown
            title: MQTT Path
            content: >-
              {% set trend = states('sensor.hioc_forecast_mqtt_trend') | lower | trim %}
              {% if trend == 'rising' %}
              # Watch

              MQTT forecast trend is rising.

              Meaning: telemetry publication may be slowing.

              Recommended action: open Diagnostics and check engine state.
              {% elif trend in ['stable', 'falling'] %}
              # Healthy

              MQTT forecast trend is not rising.

              Recommended action: no action required.
              {% else %}
              # Unknown

              MQTT forecast state is unavailable or unrecognized.

              Recommended action: review Diagnostics for current forecast state.
              {% endif %}
            grid_options:
              columns: 12
              rows: auto
            card_mod:
              style: |
