              {% if states('sensor.hioc_latest_timeline_event') in ['unknown', 'unavailable', 'none', 'None', ''] %}
              Timeline state unavailable.
              {% else %}
              Latest event: {{ states('sensor.hioc_latest_timeline_event') }}
              {% endif %}

              Incident history count: {{ states('sensor.hioc_incident_history_count') }}

              {% if recent is iterable and recent is not string and recent | count > 0 %}
              Recent incidents:

              {% for incident in recent %}
              <details>
              <summary>{{ incident.title | default('Incident', true) }} · {{ incident.recovery_type | default('unknown', true) | title }} · {{ incident.duration | default('Duration not available', true) }}</summary>

              Severity: {{ incident.severity | default('unknown', true) | title }}

              Started: {{ incident.started | default('Not available', true) }}

              Resolved: {{ incident.resolved | default('Not available', true) }}

              Root cause: {{ incident.root_cause | default('Unknown', true) }}

              {% set confidence = incident.confidence_percent | default('unknown', true) %}
              Confidence: {{ confidence }}{{ '%' if confidence is number else '' }}

              Impact summary: {{ incident.impact_summary | default('Impact summary is not available.', true) }}

              Recovery: {{ incident.recovery | default('Recovery details are not available.', true) }}

              Evidence:

              {% set evidence = incident.evidence | default(none) %}
              {% if evidence is iterable and evidence is not string and evidence | count > 0 %}
              {% for item in evidence %}
              - {{ item }}
              {% endfor %}
              {% elif evidence is iterable and evidence is not string %}
              - Evidence was not recorded for this incident.
              {% else %}
              - Evidence state is unavailable.
              {% endif %}

