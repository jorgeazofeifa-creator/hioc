              {% set temperature_trend = states('sensor.hioc_forecast_pi4_temperature_trend') | lower | trim %}
              {% set forecast_known = latency_trend in ['stable', 'falling', 'rising'] and packet_trend in ['stable', 'falling', 'rising'] and dns_trend in ['stable', 'falling', 'rising'] and mqtt_trend in ['stable', 'falling', 'rising'] and memory_trend in ['stable', 'falling', 'rising'] and temperature_trend in ['stable', 'falling', 'rising'] %}
              {% set internet_rising = latency_trend == 'rising' or packet_trend == 'rising' %}
              {% set dns_rising = dns_trend == 'rising' %}
              {% set mqtt_rising = mqtt_trend == 'rising' %}
              {% set pi4_memory_rising = memory_trend == 'rising' %}
              {% set pi4_temp_rising = temperature_trend == 'rising' %}
              {% set disk_days = states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') | float(9999) %}
              {% set trend_count = (1 if internet_rising else 0) + (1 if dns_rising else 0) + (1 if mqtt_rising else 0) + (1 if pi4_memory_rising else 0) + (1 if pi4_temp_rising else 0) %}
              {% if disk_days <= 1 %}
              # Critical

              Summary: Pi4 disk is forecast to reach 90% within {{ states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') }} day{{ '' if disk_days == 1 else 's' }}.

              Risk: Critical

              Recommendation: Open Servers and review Pi4 storage immediately.
              {% elif disk_days <= 7 or trend_count >= 3 %}
              # Attention

              Summary: multiple forecast trends may become operational problems.

              {% if internet_rising %}
              Internet latency or packet loss is increasing.
              {% endif %}
              {% if dns_rising %}
              DNS latency is increasing.
              {% endif %}
              {% if mqtt_rising %}
              MQTT publish timing is increasing.
              {% endif %}
              {% if pi4_memory_rising %}
              Pi4 memory usage is increasing.
              {% endif %}
              {% if pi4_temp_rising %}
              Pi4 temperature is increasing.
              {% endif %}
              {% if disk_days <= 7 %}
              Pi4 disk may reach 90% within {{ states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') }} days.
              {% endif %}

              Risk: Attention

              Recommendation: Open Forecast Investigation and review the affected domains.
              {% elif trend_count > 0 %}
              # Watch

              Summary: one or more forecast trends are rising.

              {% if internet_rising %}
              Internet latency or packet loss is increasing.
              {% endif %}
              {% if dns_rising %}
              DNS latency is increasing.
              {% endif %}
              {% if mqtt_rising %}
              MQTT publish timing is increasing.
              {% endif %}
              {% if pi4_memory_rising %}
              Pi4 memory usage is increasing.
              {% endif %}
              {% if pi4_temp_rising %}
              Pi4 temperature is increasing.
              {% endif %}

              Risk: Watch

              Recommendation: Continue monitoring. Open Forecast Investigation if this persists.
              {% elif forecast_known %}
              # Healthy

              Summary: No concerning trends detected.

              All monitored systems remain within expected ranges.

              Risk: Healthy

              Recommendation: No action required.
              {% else %}
              # Unknown

              Summary: one or more forecast states are unavailable or unrecognized.

              Risk: Unknown

              Recommendation: Review Diagnostics for current forecast state.
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: hioc-v2-diagnostics
            grid_options:
              columns: 15
              rows: auto
            card_mod:
              style: |
                {% set latency_trend = states('sensor.hioc_forecast_internet_latency_trend') | lower | trim %}{% set packet_trend = states('sensor.hioc_forecast_packet_loss_trend') | lower | trim %}{% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}{% set mqtt_trend = states('sensor.hioc_forecast_mqtt_trend') | lower | trim %}{% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}{% set temperature_trend = states('sensor.hioc_forecast_pi4_temperature_trend') | lower | trim %}{% set forecast_known = latency_trend in ['stable', 'falling', 'rising'] and packet_trend in ['stable', 'falling', 'rising'] and dns_trend in ['stable', 'falling', 'rising'] and mqtt_trend in ['stable', 'falling', 'rising'] and memory_trend in ['stable', 'falling', 'rising'] and temperature_trend in ['stable', 'falling', 'rising'] %}{% set trend_count = (1 if latency_trend == 'rising' or packet_trend == 'rising' else 0) + (1 if dns_trend == 'rising' else 0) + (1 if mqtt_trend == 'rising' else 0) + (1 if memory_trend == 'rising' else 0) + (1 if temperature_trend == 'rising' else 0) %}{% set disk_days = states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') | float(9999) %}
                ha-card { min-height: 180px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if disk_days <= 1 %}#ef4444{% elif disk_days <= 7 or trend_count > 0 %}#f59e0b{% elif forecast_known %}#22c55e{% else %}#64748b{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if disk_days <= 1 %}#fecaca{% elif disk_days <= 7 or trend_count > 0 %}#fcd34d{% elif forecast_known %}#86efac{% else %}#cbd5e1{% endif %}; font-size: 22px; }

          - type: markdown
            title: Platform
            content: >-
              {% if states('sensor.hioc_platform_status') == 'online' %}
              # Healthy

              HIOC {{ states('sensor.hioc_platform_version') }} platform status is online.

              Next step: no action required.
              {% else %}
              # Informational

              Platform status is {{ states('sensor.hioc_platform_status') }}.

              Next step: open Servers.
              {% endif %}
