                h1 { color: {% if states('sensor.hioc_platform_status') == 'online' %}#86efac{% else %}#cbd5e1{% endif %}; font-size: 22px; }

  - title: Diagnostics
    path: hioc-v2-diagnostics
    icon: mdi:stethoscope
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Incident Mission Control
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              # {{ states('sensor.hioc_incident_active') }}

              Phase: {{ state_attr('sensor.hioc_incident_active','phase') | default('active') | title }}

              Severity: {{ states('sensor.hioc_incident_severity') | title }}

              Root cause: {{ state_attr('sensor.hioc_incident_active','root_cause') | default('Not available') }}

              Confidence: {{ state_attr('sensor.hioc_incident_active','confidence_percent') | default(0) }}%

              Started: {{ states('sensor.hioc_incident_started') }}

              Updated: {{ states('sensor.hioc_incident_updated') }}

              Duration: {{ state_attr('sensor.hioc_incident_active','duration_seconds') | default('Not available') }}
              {% else %}
              # No Active Incident

              Diagnostics are ready.

              Current watch items:
              {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}
              - DNS trend rising
              {% endif %}
              {% if states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}
              - Pi4 memory trend rising
              {% endif %}
              {% if states('sensor.hioc_forecast_dns_trend') != 'rising' and states('sensor.hioc_forecast_pi4_memory_trend') != 'rising' %}
              - No current watch items
              {% endif %}
              {% endif %}
            grid_options:
              columns: 7
            card_mod:
              style: |
                ha-card { min-height: 310px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: linear-gradient(135deg, rgba(13,29,46,.98), rgba(5,11,20,.98)); color: #dcecff; box-shadow: 0 18px 48px rgba(0,0,0,.36); }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: markdown
            title: Recommended Action
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              # Investigate Now

              Action: {{ states('sensor.hioc_incident_recommendation') }}

              Why: HIOC correlated an active incident with probable root cause {{ state_attr('sensor.hioc_incident_active','root_cause') | default('Not available') }}.
              {% elif states('sensor.hioc_forecast_dns_trend') == 'rising' %}
              # Review DNS If Trend Persists

              Action: open Network diagnostics and check DNS trend.

              Why: DNS latency is increasing compared to recent baseline.
              {% elif states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}
              # Check Pi4 Memory

              Action: open Servers and review Pi4 health.

              Why: memory usage is trending upward.
              {% else %}
              # No Action Required

              Action: continue monitoring.

              Why: no active incident or significant watch item is detected.
              {% endif %}
            grid_options:
              columns: 5
            card_mod:
              style: |
                ha-card { min-height: 310px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: markdown
            title: Evidence
            content: >-
              {% set evidence = state_attr('sensor.hioc_incident_active','evidence') %}
              {% if is_state('sensor.hioc_incident_status','active') and evidence is iterable and evidence is not string %}
              {% for item in evidence %}
              - {{ item }}
              {% endfor %}
              {% elif is_state('sensor.hioc_incident_status','active') %}
              - {{ states('sensor.hioc_incident_reason') }}
              {% else %}
              - Internet latency trend: {{ states('sensor.hioc_forecast_internet_latency_trend') | title }}
              - Packet loss trend: {{ states('sensor.hioc_forecast_packet_loss_trend') | title }}
              - DNS trend: {{ states('sensor.hioc_forecast_dns_trend') | title }}
              - MQTT trend: {{ states('sensor.hioc_forecast_mqtt_trend') | title }}
              - Pi4 memory trend: {{ states('sensor.hioc_forecast_pi4_memory_trend') | title }}
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card { min-height: 250px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if is_state('sensor.hioc_incident_status','active') %}#f59e0b{% elif states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' or states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: markdown
            title: Dependency Path
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              {% set affected = state_attr('sensor.hioc_incident_active','affected') %}
              {% if affected is iterable and affected is not string %}
              Likely affected chain:

              {% for item in affected %}
              - {{ item }}
              {% endfor %}
              {% else %}
              {{ state_attr('sensor.hioc_incident_active','impact') | default('Dependency path is not available') }}
              {% endif %}
              {% else %}
              No active dependency path.
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card { min-height: 250px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: markdown
            title: Timeline
            content: >-
              {% if states('sensor.hioc_latest_timeline_event') in ['unknown', 'unavailable', 'none', 'None', ''] %}
              No recent event recorded.
              {% else %}
              Latest event: {{ states('sensor.hioc_latest_timeline_event') }}
              {% endif %}

              Incident history count: {{ states('sensor.hioc_incident_history_count') }}
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 210px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #60a5fa; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: entities
            title: Live Telemetry
            show_header_toggle: false
            entities:
              - sensor.hioc_forecast_internet_latency_trend
              - sensor.hioc_forecast_internet_24h_average_latency
              - sensor.hioc_forecast_packet_loss_trend
              - sensor.hioc_forecast_dns_trend
              - sensor.hioc_forecast_mqtt_trend
              - sensor.hioc_history_engine_status
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #38bdf8; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: entities
            title: Engine State
            show_header_toggle: false
            entities:
              - sensor.hioc_platform_status
              - sensor.hioc_platform_version
              - sensor.hioc_correlation_engine_version
              - sensor.hioc_engine_status
              - sensor.hioc_incident_updated
              - sensor.hioc_inventory_status
              - sensor.hioc_statistics_samples_network
              - sensor.hioc_statistics_samples_host
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #64748b; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #60a5fa; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

  - title: Inventory
