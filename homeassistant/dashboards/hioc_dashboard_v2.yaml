  - title: Diagnostics
    path: hioc-v2-diagnostics
    icon: mdi:stethoscope
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Incident Mission Control
            content: >-
              {% set incident = states('sensor.hioc_incident_status') | lower | trim %}
              {% set severity = states('sensor.hioc_incident_severity') | lower | trim %}
              {% set severity_label = severity | title if severity in ['warning', 'major', 'critical'] else 'Unknown' %}
              {% if incident == 'active' %}
              # {{ states('sensor.hioc_incident_active') }}

              Phase: {{ state_attr('sensor.hioc_incident_active','phase') | default('unknown', true) | title }}

              Severity: {{ severity_label }}

              Root cause: {{ state_attr('sensor.hioc_incident_active','root_cause') | default('Unknown', true) }}

              {% set confidence = state_attr('sensor.hioc_incident_active','confidence_percent') | default('unknown', true) %}
              Confidence: {{ confidence }}{{ '%' if confidence is number else '' }}

              Started: {{ states('sensor.hioc_incident_started') }}

              Updated: {{ states('sensor.hioc_incident_updated') }}

              Duration: {{ state_attr('sensor.hioc_incident_active','duration_seconds') | default('Not available', true) }}
              {% elif incident in ['none', 'resolved'] %}
              # No Active Incident

              Diagnostics are ready.

              {% set dns_trend = states('sensor.hioc_forecast_dns_trend') | lower | trim %}
              {% set memory_trend = states('sensor.hioc_forecast_pi4_memory_trend') | lower | trim %}
              Current watch items:
              {% if dns_trend == 'rising' %}
              - DNS trend rising
              {% endif %}
              {% if memory_trend == 'rising' %}
              - Pi4 memory trend rising
              {% endif %}
              {% if dns_trend in ['stable', 'falling'] and memory_trend in ['stable', 'falling'] %}
              - No current watch items
              {% elif dns_trend not in ['stable', 'falling', 'rising'] or memory_trend not in ['stable', 'falling', 'rising'] %}
              - Forecast state is unavailable or unrecognized
              {% endif %}
              {% else %}
              # Unknown

              Incident status is unavailable. Diagnostics cannot confirm an active or resolved state.
              {% endif %}
