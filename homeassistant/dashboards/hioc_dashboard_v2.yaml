              - sensor.hioc_inventory_healthy_devices
              - sensor.hioc_inventory_watch_devices
              - sensor.hioc_inventory_degraded_devices
              - sensor.hioc_inventory_offline_devices
              - sensor.hioc_inventory_service_count
              - sensor.hioc_inventory_topology_edges
              - sensor.hioc_inventory_dependency_edges
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 300px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #38bdf8; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: markdown
            title: Device Health
            content: >-
              {% set devices = state_attr('sensor.hioc_inventory_devices', 'devices') %}
              {% if devices is iterable and devices is not string %}
              {% for device in devices | sort(attribute='health_score') %}
              **{{ device.display_name }}**

              {{ device.health_status | title }} - {{ device.health_score }}%

              IP: {{ device.ip | default('No IP reported') }}

              Role: {{ device.roles | default(['endpoint']) | join(', ') }}

              {% endfor %}
              {% else %}
              Inventory device attributes have not arrived.
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card { min-height: 500px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #60a5fa; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.24; }
                strong { color: #bfdbfe; }

          - type: markdown
            title: Services
            content: >-
              {% set services = state_attr('sensor.hioc_inventory_services', 'services') %}
              {% if services is iterable and services is not string %}
              {% for service in services %}
              **{{ service.name }}**

              {{ service.type | title }} - {{ service.status | title }}

              {% endfor %}
              {% else %}
              Inventory service attributes have not arrived.
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card { min-height: 500px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.24; }
                strong { color: #bfdbfe; }

  - title: Network
    path: hioc-v2-network
    icon: mdi:web-check
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Network Health
            content: >-
              {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}
              # Watch

              Internet latency or packet loss is trending upward.

              Current risk: Watch.

              Recommended action: continue monitoring and open Diagnostics if the trend persists.
              {% else %}
              # Healthy

              Internet latency and packet loss are stable.

              Current risk: Healthy.

              Recommended action: no action required.
              {% endif %}
            grid_options:
              columns: 5
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: linear-gradient(135deg, rgba(13,29,46,.98), rgba(5,11,20,.98)); color: #dcecff; box-shadow: 0 18px 48px rgba(0,0,0,.36); }
                h1 { color: {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: markdown
            title: DNS Investigation
            content: >-
              {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}
              # Watch

              DNS trend is rising.

              Meaning: DNS latency is increasing compared to recent baseline.

              Recommended action: review DNS diagnostics if this persists.
              {% else %}
              # Healthy

              DNS forecast trend is not rising.

              Recommended action: no action required.
              {% endif %}
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: markdown
            title: MQTT Path
            content: >-
              {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}
              # Watch

              MQTT forecast trend is rising.

              Meaning: telemetry publication may be slowing.

              Recommended action: open Diagnostics and check engine state.
              {% else %}
              # Healthy

              MQTT forecast trend is not rising.

              Recommended action: no action required.
              {% endif %}
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: entities
            title: Network Evidence
            show_header_toggle: false
            entities:
              - sensor.hioc_forecast_internet_latency_trend
              - sensor.hioc_forecast_internet_24h_average_latency
              - sensor.hioc_forecast_packet_loss_trend
              - sensor.hioc_forecast_dns_trend
              - sensor.hioc_forecast_mqtt_trend
              - sensor.hioc_history_engine_status
            grid_options:
              columns: 12
            card_mod:
              style: |
                ha-card { min-height: 210px; border-radius: 16px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #38bdf8; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

