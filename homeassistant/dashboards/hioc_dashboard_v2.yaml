title: HIOC Dashboard v2
views:
  - title: Executive
    path: hioc-v2-executive
    icon: mdi:monitor-dashboard
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Mission Status
            content: >-
              {% set incident = states('sensor.hioc_incident_status') %}
              {% set offline = states('sensor.hioc_inventory_offline_devices') | int(0) %}
              {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(0) %}
              {% if incident == 'active' %}
              # Critical

              Active {{ states('sensor.hioc_incident_severity') }} incident affecting {{ states('sensor.hioc_incident_system') }}.
              {% elif offline > 0 or degraded > 0 %}
              # Degraded

              Inventory reports {{ degraded }} degraded and {{ offline }} offline devices.
              {% elif states('sensor.hioc_engine_status') == 'online' and states('sensor.hioc_inventory_status') in ['online', 'degraded'] %}
              # Operational

              No active incident. HIOC engines are reporting.
              {% else %}
              # Unknown

              HIOC status data is incomplete.
              {% endif %}
            grid_options:
              columns: 12
            card_mod:
              style: |
                ha-card {
                  min-height: 188px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  background: linear-gradient(135deg, rgba(10,24,39,.98), rgba(4,10,18,.98));
                  box-shadow: 0 18px 48px rgba(0,0,0,.36);
                  color: #dcecff;
                }
                ha-card:before {
                  content: "";
                  position: absolute;
                  inset: 0 0 auto 0;
                  height: 4px;
                  background: {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 or states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#f59e0b{% else %}#22c55e{% endif %};
                  border-radius: 18px 18px 0 0;
                }
                ha-markdown {
                  --mdc-typography-body1-font-size: 15px;
                  line-height: 1.35;
                }
                h1 {
                  color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 or states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#fcd34d{% else %}#86efac{% endif %};
                  font-size: 30px;
                  margin: 0 0 12px 0;
                }

          - type: markdown
            title: Current Incident
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              **{{ states('sensor.hioc_incident_severity') | title }} - {{ states('sensor.hioc_incident_active') }}**

              Phase: {{ state_attr('sensor.hioc_incident_active','phase') | default('active') | title }}

              Root cause: {{ state_attr('sensor.hioc_incident_active','root_cause') | default('unknown') }}

              Confidence: {{ state_attr('sensor.hioc_incident_active','confidence_percent') | default(0) }}%

              Started: {{ states('sensor.hioc_incident_started') }}

              Recommendation: {{ states('sensor.hioc_incident_recommendation') }}
              {% else %}
              **No active incident**

              Latest event: {{ states('sensor.hioc_latest_timeline_event') }}
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card {
                  min-height: 250px;
                  border-radius: 14px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#22c55e{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.36; }

          - type: markdown
            title: Affected Systems
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              {% set affected = state_attr('sensor.hioc_incident_active','affected') %}
              {% if affected is iterable and affected is not string %}
              {% for item in affected %}
              - {{ item }}
              {% endfor %}
              {% else %}
              {{ state_attr('sensor.hioc_incident_active','impact') | default('Affected systems unavailable') }}
              {% endif %}
              {% else %}
              No systems currently affected by an active incident.
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card {
                  min-height: 250px;
                  border-radius: 14px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid #38bdf8;
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.34; }

          - type: entities
            title: Domain Health
            show_header_toggle: false
            entities:
              - entity: sensor.hioc_incident_status
                name: Incident
                icon: mdi:alert-decagram
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-diagnostics
              - entity: sensor.hioc_inventory_operations_summary
                name: Inventory
                icon: mdi:devices
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-inventory
              - entity: sensor.hioc_forecast_internet_latency_trend
                name: Internet Forecast
                icon: mdi:web-check
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-network
              - entity: sensor.hioc_forecast_dns_trend
                name: DNS Forecast
                icon: mdi:dns
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-network
              - entity: sensor.hioc_forecast_mqtt_trend
                name: MQTT Forecast
                icon: mdi:message-processing
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-diagnostics
              - entity: sensor.hioc_forecast_pi4_temperature_trend
                name: Pi4 Forecast - Temperature
                icon: mdi:raspberry-pi
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-servers
              - entity: sensor.hioc_forecast_pi4_memory_trend
                name: Pi4 Forecast - Memory
                icon: mdi:memory
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/hioc-v2-servers
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card {
                  min-height: 290px;
                  border-radius: 14px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid #60a5fa;
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  --primary-text-color: #dcecff;
                  --secondary-text-color: #93a4b8;
                  --paper-item-icon-color: #38bdf8;
                }
                .card-content { padding-top: 4px; }
                hui-generic-entity-row {
                  border-bottom: 1px solid rgba(148, 163, 184, .12);
                }

          - type: markdown
            title: Top Risks
            content: >-
              {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}
              - Offline inventory devices: {{ states('sensor.hioc_inventory_offline_devices') }}
              {% endif %}
              {% if states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}
              - Degraded inventory devices: {{ states('sensor.hioc_inventory_degraded_devices') }}
              {% endif %}
              {% if states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') not in ['unknown', 'unavailable', 'none', 'None'] %}
              - Pi4 disk reaches 90% in {{ states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') }} days
              {% endif %}
              {% if states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}
              - Packet loss trend is rising
              {% endif %}
              {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}
              - DNS forecast is rising
              {% endif %}
              {% if states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}
              - Pi4 forecast is rising
              {% endif %}
              {% if states('sensor.hioc_inventory_offline_devices') | int(0) == 0
                    and states('sensor.hioc_inventory_degraded_devices') | int(0) == 0
                    and states('sensor.hioc_forecast_packet_loss_trend') != 'rising'
                    and states('sensor.hioc_forecast_dns_trend') != 'rising'
                    and states('sensor.hioc_forecast_pi4_temperature_trend') != 'rising'
                    and states('sensor.hioc_forecast_pi4_memory_trend') != 'rising'
                    and states('sensor.hioc_forecast_pi4_days_to_90_percent_disk') in ['unknown', 'unavailable', 'none', 'None'] %}
              No current HIOC risks reported.
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card {
                  min-height: 290px;
                  border-radius: 14px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid {% if states('sensor.hioc_forecast_dns_trend') == 'rising' or states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %};
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.34; }

          - type: markdown
            title: Latest Events
            content: >-
              **Timeline:** {{ states('sensor.hioc_latest_timeline_event') }}

              **Incident history:** {{ states('sensor.hioc_incident_history_count') }} recorded incidents

              **Inventory state:** {{ states('sensor.hioc_inventory_operations_summary') }}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card {
                  min-height: 220px;
                  border-radius: 14px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid #38bdf8;
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }

          - type: markdown
            title: Data Freshness
            content: >-
              - Platform: HIOC {{ states('sensor.hioc_platform_version') }} - {{ states('sensor.hioc_platform_status') }}
              - Core: {{ states('sensor.hioc_core_version') }}
              - Correlation: {{ states('sensor.hioc_correlation_engine_version') }}
              - Dashboard: {{ states('sensor.hioc_dashboard_version') }}
              - Schema: {{ states('sensor.hioc_schema_version') }}
              - MQTT API: {{ states('sensor.hioc_mqtt_api_version') }}
              - Build: {{ states('sensor.hioc_build') }}
              - Incident engine: {{ states('sensor.hioc_engine_status') }}
              - Incident updated: {{ states('sensor.hioc_incident_updated') }}
              - History engine: {{ states('sensor.hioc_history_engine_status') }}
              - Inventory engine: {{ states('sensor.hioc_inventory_status') }}
              - Inventory devices: {{ states('sensor.hioc_inventory_device_count') }}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card {
                  min-height: 220px;
                  border-radius: 14px;
                  border: 1px solid rgba(90, 140, 185, .24);
                  border-left: 5px solid #64748b;
                  background: rgba(12, 27, 43, .96);
                  box-shadow: 0 12px 32px rgba(0,0,0,.28);
                  color: #dcecff;
                }
                ha-markdown { line-height: 1.28; }

  - title: Operations
    path: hioc-v2-operations
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Live Operational State
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              # Critical

              {{ states('sensor.hioc_incident_system') }} incident is active.
              {% else %}
              # Operational

              No active incident reported by HIOC.
              {% endif %}
            grid_options:
              columns: 12
            card_mod:
              style: |
                ha-card {
                  min-height: 150px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  background: linear-gradient(135deg, rgba(10,24,39,.98), rgba(4,10,18,.98));
                  box-shadow: 0 18px 48px rgba(0,0,0,.36);
                  color: #dcecff;
                }
                ha-card:before {
                  content: "";
                  position: absolute;
                  inset: 0 0 auto 0;
                  height: 4px;
                  background: {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#22c55e{% endif %};
                  border-radius: 18px 18px 0 0;
                }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% else %}#86efac{% endif %}; }

          - type: markdown
            title: Incident
            content: >-
              # {{ states('sensor.hioc_incident_status') | title }}

              {{ states('sensor.hioc_incident_active') }}
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% else %}#86efac{% endif %}; font-size: 24px; }

          - type: markdown
            title: Inventory
            content: >-
              # {{ states('sensor.hioc_inventory_operations_summary') }}

              {{ states('sensor.hioc_inventory_device_count') }} devices - {{ states('sensor.hioc_inventory_service_count') }} services
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#ef4444{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#fecaca{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#fcd34d{% else %}#86efac{% endif %}; font-size: 22px; }

          - type: markdown
            title: Internet
            content: >-
              # {{ states('sensor.hioc_forecast_internet_latency_trend') | title }}

              24h avg {{ states('sensor.hioc_forecast_internet_24h_average_latency') }} ms
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_forecast_internet_latency_trend') == 'rising' or states('sensor.hioc_forecast_packet_loss_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; font-size: 24px; }

          - type: markdown
            title: DNS
            content: >-
              # {{ states('sensor.hioc_forecast_dns_trend') | title }}

              Forecast trend from HIOC history
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_forecast_dns_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; font-size: 24px; }

          - type: markdown
            title: MQTT
            content: >-
              # {{ states('sensor.hioc_forecast_mqtt_trend') | title }}

              History engine {{ states('sensor.hioc_history_engine_status') }}
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_forecast_mqtt_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; font-size: 24px; }

          - type: markdown
            title: Pi4
            content: >-
              # Temp {{ states('sensor.hioc_forecast_pi4_temperature_trend') | title }}

              Memory {{ states('sensor.hioc_forecast_pi4_memory_trend') | title }} - Disk {{ states('sensor.hioc_forecast_pi4_disk_growth') }} %/day
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid {% if states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#f59e0b{% else %}#22c55e{% endif %}; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: {% if states('sensor.hioc_forecast_pi4_temperature_trend') == 'rising' or states('sensor.hioc_forecast_pi4_memory_trend') == 'rising' %}#fcd34d{% else %}#86efac{% endif %}; font-size: 22px; }

          - type: markdown
            title: Forecasts
            content: >-
              # Samples

              Network {{ states('sensor.hioc_statistics_samples_network') }} - Host {{ states('sensor.hioc_statistics_samples_host') }}
            grid_options:
              columns: 3
            card_mod:
              style: |
                ha-card { min-height: 156px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                h1 { color: #bae6fd; font-size: 24px; }

  - title: Diagnostics
    path: hioc-v2-diagnostics
    icon: mdi:stethoscope
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Incident Mission Control
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              # {{ states('sensor.hioc_incident_active') }}

              Severity: {{ states('sensor.hioc_incident_severity') | title }}

              Phase: {{ state_attr('sensor.hioc_incident_active','phase') | default('active') | title }}

              Root cause: {{ state_attr('sensor.hioc_incident_active','root_cause') | default('unknown') }}

              Confidence: {{ state_attr('sensor.hioc_incident_active','confidence_percent') | default(0) }}%

              Started: {{ states('sensor.hioc_incident_started') }}

              Recommendation: {{ states('sensor.hioc_incident_recommendation') }}
              {% else %}
              # No active incident

              Diagnostics are ready. Latest event: {{ states('sensor.hioc_latest_timeline_event') }}
              {% endif %}
            grid_options:
              columns: 12
            card_mod:
              style: |
                ha-card {
                  min-height: 210px;
                  border-radius: 18px;
                  border: 1px solid rgba(90, 140, 185, .28);
                  border-left: 6px solid {% if is_state('sensor.hioc_incident_status','active') %}#ef4444{% else %}#22c55e{% endif %};
                  background: linear-gradient(135deg, rgba(13,29,46,.98), rgba(5,11,20,.98));
                  box-shadow: 0 18px 48px rgba(0,0,0,.36);
                  color: #dcecff;
                }
                h1 { color: {% if is_state('sensor.hioc_incident_status','active') %}#fecaca{% else %}#86efac{% endif %}; }

          - type: markdown
            title: Evidence
            content: >-
              {% set evidence = state_attr('sensor.hioc_incident_active','evidence') %}
              {% if evidence is iterable and evidence is not string %}
              {% for item in evidence %}
              - {{ item }}
              {% endfor %}
              {% else %}
              {{ states('sensor.hioc_incident_reason') }}
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card { min-height: 240px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #f59e0b; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.32; }

          - type: markdown
            title: Dependency Path
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
              {% set affected = state_attr('sensor.hioc_incident_active','affected') %}
              {% if affected is iterable and affected is not string %}
              {% for item in affected %}
              {{ item }}{% if not loop.last %} -> {% endif %}
              {% endfor %}
              {% else %}
              {{ state_attr('sensor.hioc_incident_active','impact') | default('No dependency path available') }}
              {% endif %}
              {% else %}
              No active dependency path.
              {% endif %}
            grid_options:
              columns: 6
            card_mod:
              style: |
                ha-card { min-height: 240px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: markdown
            title: Timeline
            content: >-
              Latest: {{ states('sensor.hioc_latest_timeline_event') }}

              Incident history count: {{ states('sensor.hioc_incident_history_count') }}
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 190px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #60a5fa; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: entities
            title: Live Telemetry
            show_header_toggle: false
            entities:
              - sensor.hioc_forecast_internet_latency_trend
              - sensor.hioc_forecast_internet_24h_average_latency
              - sensor.hioc_forecast_packet_loss_trend
              - sensor.hioc_forecast_dns_trend
              - sensor.hioc_forecast_mqtt_trend
              - sensor.hioc_history_engine_status
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #38bdf8; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: entities
            title: Engine State
            show_header_toggle: false
            entities:
              - sensor.hioc_platform_status
              - sensor.hioc_platform_version
              - sensor.hioc_correlation_engine_version
              - sensor.hioc_engine_status
              - sensor.hioc_incident_updated
              - sensor.hioc_inventory_status
              - sensor.hioc_statistics_samples_network
              - sensor.hioc_statistics_samples_host
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 260px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #64748b; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #60a5fa; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

  - title: Inventory
    path: hioc-v2-inventory
    icon: mdi:devices
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            title: Inventory Status
            content: >-
              # {{ states('sensor.hioc_inventory_operations_summary') }}

              {{ states('sensor.hioc_inventory_device_count') }} devices - {{ states('sensor.hioc_inventory_service_count') }} services - lowest health {{ states('sensor.hioc_inventory_lowest_health') }}%
            grid_options:
              columns: 8
            card_mod:
              style: |
                ha-card { min-height: 150px; border-radius: 18px; border: 1px solid rgba(90,140,185,.28); border-left: 6px solid {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#ef4444{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#f59e0b{% else %}#22c55e{% endif %}; background: linear-gradient(135deg, rgba(13,29,46,.98), rgba(5,11,20,.98)); color: #dcecff; box-shadow: 0 18px 48px rgba(0,0,0,.36); }
                h1 { color: {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#fecaca{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#fcd34d{% else %}#86efac{% endif %}; }

          - type: entities
            title: Counts
            show_header_toggle: false
            entities:
              - sensor.hioc_inventory_device_count
              - sensor.hioc_inventory_healthy_devices
              - sensor.hioc_inventory_watch_devices
              - sensor.hioc_inventory_degraded_devices
              - sensor.hioc_inventory_offline_devices
              - sensor.hioc_inventory_service_count
              - sensor.hioc_inventory_topology_edges
              - sensor.hioc_inventory_dependency_edges
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 300px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); --primary-text-color: #dcecff; --secondary-text-color: #93a4b8; --paper-item-icon-color: #38bdf8; box-shadow: 0 12px 32px rgba(0,0,0,.28); }

          - type: markdown
            title: Device Health
            content: >-
              {% set devices = state_attr('sensor.hioc_inventory_devices', 'devices') %}
              {% if devices is iterable and devices is not string %}
              | Device | State | Health | IP |
              |---|---:|---:|---|
              {% for device in devices | sort(attribute='health_score') %}
              | **{{ device.display_name }}** | {{ device.health_status }} | {{ device.health_score }}% | {{ device.ip | default('no ip') }} |
              {% endfor %}
              {% else %}
              Inventory device attributes have not arrived.
              {% endif %}
            grid_options:
              columns: 8
            card_mod:
              style: |
                ha-card { min-height: 420px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #60a5fa; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.22; }
                table { width: 100%; border-collapse: collapse; font-size: 13px; }
                th { color: #93c5fd; text-align: left; border-bottom: 1px solid rgba(148,163,184,.24); padding: 6px 4px; }
                td { border-bottom: 1px solid rgba(148,163,184,.12); padding: 5px 4px; }

          - type: markdown
            title: Services
            content: >-
              {% set services = state_attr('sensor.hioc_inventory_services', 'services') %}
              {% if services is iterable and services is not string %}
              | Service | Type | Status |
              |---|---|---:|
              {% for service in services %}
              | **{{ service.name }}** | {{ service.type }} | {{ service.status }} |
              {% endfor %}
              {% else %}
              Inventory service attributes have not arrived.
              {% endif %}
            grid_options:
              columns: 4
            card_mod:
              style: |
                ha-card { min-height: 420px; border-radius: 14px; border: 1px solid rgba(90,140,185,.24); border-left: 5px solid #38bdf8; background: rgba(12,27,43,.96); color: #dcecff; box-shadow: 0 12px 32px rgba(0,0,0,.28); }
                ha-markdown { line-height: 1.22; }
                table { width: 100%; border-collapse: collapse; font-size: 13px; }
                th { color: #93c5fd; text-align: left; border-bottom: 1px solid rgba(148,163,184,.24); padding: 6px 4px; }
                td { border-bottom: 1px solid rgba(148,163,184,.12); padding: 5px 4px; }

