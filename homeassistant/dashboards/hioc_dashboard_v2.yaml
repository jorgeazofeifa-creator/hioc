                h1 { color: {% if states('sensor.hioc_inventory_offline_devices') | int(0) > 0 %}#fecaca{% elif states('sensor.hioc_inventory_degraded_devices') | int(0) > 0 %}#fcd34d{% else %}#86efac{% endif %}; }

