title: HIOC Living Inventory
views:
  - title: Inventory
    path: hioc-living-inventory
    icon: mdi:devices
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Living Inventory
            subtitle: Devices, topology, service dependencies, firmware, and health

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hioc_inventory_operations_summary') }}"
            secondary: >-
              {{ states('sensor.hioc_inventory_device_count') }} devices ·
              {{ states('sensor.hioc_inventory_service_count') }} services ·
              lowest health {{ states('sensor.hioc_inventory_lowest_health') }}%
            icon: mdi:devices
            icon_color: >-
              {% set status = states('sensor.hioc_inventory_status') %}
              {% set offline = states('sensor.hioc_inventory_offline_devices') | int(-1) %}
              {% set degraded = states('sensor.hioc_inventory_degraded_devices') | int(-1) %}
              {% set watch = states('sensor.hioc_inventory_watch_devices') | int(-1) %}
              {% if status not in ['online', 'degraded'] or offline < 0 or degraded < 0 or watch < 0 %}
                grey
              {% elif offline > 0 %}
                red
              {% elif degraded > 0 %}
                deep-orange
              {% elif watch > 0 %}
                blue
              {% else %}
                green
              {% endif %}
            layout: horizontal
            fill_container: true

          - type: markdown
            content: >-
              ## What is happening?

              **{{ states('sensor.hioc_inventory_operations_summary') }}**

              **Why?**  
              {{ states('sensor.hioc_inventory_degraded_devices') }} degraded,
              {{ states('sensor.hioc_inventory_offline_devices') }} offline, and
              {{ states('sensor.hioc_inventory_watch_devices') }} watch devices.

              **What is affected?**  
              {{ states('sensor.hioc_inventory_dependency_edges') }} service dependency links and
              {{ states('sensor.hioc_inventory_topology_edges') }} topology links are currently mapped.

              **What should I do?**  
              {{ states('sensor.hioc_inventory_recommended_action') }}

      - type: grid
        cards:
          - type: entities
            title: Inventory Counts
            show_header_toggle: false
            entities:
              - sensor.hioc_inventory_status
              - sensor.hioc_inventory_device_count
              - sensor.hioc_inventory_healthy_devices
              - sensor.hioc_inventory_watch_devices
              - sensor.hioc_inventory_degraded_devices
              - sensor.hioc_inventory_offline_devices
              - sensor.hioc_inventory_lowest_health
              - sensor.hioc_inventory_service_count

          - type: entities
            title: Graph Coverage
            show_header_toggle: false
            entities:
              - sensor.hioc_inventory_topology_edges
              - sensor.hioc_inventory_dependency_edges
              - sensor.hioc_inventory_devices
              - sensor.hioc_inventory_services

      - type: grid
        cards:
          - type: markdown
            title: Watch Devices
            content: >-
              {% set devices = state_attr('sensor.hioc_inventory_devices', 'devices') %}
              {% if devices is iterable and devices is not string %}
              {% set watch_devices = devices | selectattr('health_status', 'equalto', 'watch') | sort(attribute='display_name') | list %}
              {% set aged_watch_devices = watch_devices | selectattr('observation_age_seconds', 'number') | sort(attribute='observation_age_seconds', reverse=true) | list %}
              {% set unknown_age_watch_devices = watch_devices | rejectattr('observation_age_seconds', 'number') | list %}
              {% if watch_devices | count == 0 %}
              No watch devices
              {% else %}
              {% for device in aged_watch_devices + unknown_age_watch_devices %}
              **{% if device.get('display_name') is string and device.get('display_name') %}{{ device.get('display_name') }}{% elif device.get('name') is string and device.get('name') %}{{ device.get('name') }}{% else %}Unknown device{% endif %}**
              {% if device.get('hostname') is string and device.get('hostname') %}Hostname: {{ device.get('hostname') }}{% endif %}

              IP: {{ device.get('ip') if device.get('ip') is string and device.get('ip') else 'Unknown' }}

              MAC: {{ device.get('mac') if device.get('mac') is string and device.get('mac') else 'Unknown' }}

              Observation: {{ device.get('observation_status') if device.get('observation_status') is string and device.get('observation_status') else 'Unknown' }}
              {% set age = device.get('observation_age_seconds') %}
              {% if age is number and age is not boolean %}
              Age: {% if age >= 86400 %}{{ age // 86400 }}d {{ (age % 86400) // 3600 }}h{% elif age >= 3600 %}{{ age // 3600 }}h {{ (age % 3600) // 60 }}m{% elif age >= 60 %}{{ age // 60 }}m{% else %}<1m{% endif %}
              {% else %}
              Age: unknown
              {% endif %}

              {% set sources = device.get('sources') %}
              Sources: {% if sources is iterable and sources is not string and sources is not mapping and sources | count > 0 %}{{ sources | join(', ') }}{% elif device.get('source') is string and device.get('source') %}{{ device.get('source') }}{% else %}Unknown{% endif %}

              {% set reasons = device.get('health_reasons') %}
              Health reason: {% if reasons is iterable and reasons is not string and reasons is not mapping and reasons | count > 0 %}{{ reasons | join('; ') }}{% elif reasons is string and reasons %}{{ reasons }}{% else %}Unknown{% endif %}

              {% endfor %}
              {% endif %}
              {% else %}
              Inventory device attributes have not arrived yet.
              {% endif %}

          - type: markdown
            content: >-
              ## Device Health

              {% set devices = state_attr('sensor.hioc_inventory_devices', 'devices') %}
              {% if devices is iterable and devices is not string %}
              {% for device in devices | sort(attribute='health_score') %}
              **{{ device.display_name }}**  
              {{ device.health_status }} · {{ device.health_score }}% · {{ device.ip | default('no ip') }} · {{ device.mac | default('no mac') }}  
              Roles: {{ device.roles | join(', ') if device.roles is iterable and device.roles is not string else device.roles }}  
              Last seen: {{ device.last_seen }}  
              {% if device.firmware %}Firmware: {{ device.firmware }}{% endif %}

              {% endfor %}
              {% else %}
              Inventory device attributes have not arrived yet.
              {% endif %}

          - type: markdown
            content: >-
              ## Services

              {% set services = state_attr('sensor.hioc_inventory_services', 'services') %}
              {% if services is iterable and services is not string %}
              {% for service in services %}
              **{{ service.name }}**  
              {{ service.type }} · {{ service.status }}{% if service.port is defined %} · port {{ service.port }}{% endif %}

              {% endfor %}
              {% else %}
              Inventory service attributes have not arrived yet.
              {% endif %}
