title: Home Infrastructure
views:
  - title: Executive
    path: executive
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >-
              ## MISSION STATUS


              # 🟢 {{ states('sensor.hioc_mission_status') }}


              **Active Incidents**  

              {{ state_attr('sensor.hioc_mission_status','active_incidents') }}


              **Infrastructure Score**  

              {{ state_attr('sensor.hioc_mission_status','infrastructure_score')
              }}


              **Protected Devices**  

              {{ state_attr('sensor.hioc_mission_status','protected_devices') }}
              devices


              **Services**  

              {{ state_attr('sensor.hioc_mission_status','services_healthy')
              }}/{{ state_attr('sensor.hioc_mission_status','services_total') }}
              Healthy


              **Internet**  

              {{ state_attr('sensor.hioc_mission_status','internet_health') }}
            card_mod:
              style: |
                ha-card {
                  min-height: 240px;
                  border-radius: 28px;
                  padding: 22px;
                  background: linear-gradient(135deg, rgba(16,70,95,.98), rgba(8,18,30,.98));
                  box-shadow: 0 16px 45px rgba(0,0,0,.35);
                }
            grid_options:
              columns: 12
              rows: 8
          - type: custom:mini-graph-card
            name: Infrastructure Score
            entities:
              - sensor.infrastructure_score
            hours_to_show: 24
            points_per_hour: 4
            show:
              fill: true
              extrema: false
              icon: false
            height: 140
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Incident Center
            subtitle: Pi4 Incident Engine v1.2.0, root cause, evidence, recovery, and recommendations
          - type: custom:mushroom-template-card
            primary: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
                {{ states('sensor.hioc_incident_system') }} Incident
              {% elif is_state('sensor.hioc_incident_status','recovering') %}
                Incident Recovering
              {% else %}
                No Active Incident
              {% endif %}
            secondary: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
                {{ states('sensor.hioc_incident_active') }} · {{ state_attr('sensor.hioc_incident_active','root_cause') }} · {{ state_attr('sensor.hioc_incident_active','confidence_percent') }}% confidence
              {% else %}
                Engine {{ state_attr('sensor.hioc_incident_summary','engine_version') | default('1.2.0') }} · Signals {{ state_attr('sensor.hioc_incident_summary','signals_detected') | default(0) }} · History {{ states('sensor.hioc_incident_history_count') }} incidents
              {% endif %}
            icon: >-
              {% if is_state('sensor.hioc_incident_status','active') %}
                mdi:alert-decagram
              {% else %}
                mdi:shield-check
              {% endif %}
            icon_color: >-
              {% set sev = states('sensor.hioc_incident_severity') %}
              {% if is_state('sensor.hioc_incident_status','active') and sev == 'critical' %}
                red
              {% elif is_state('sensor.hioc_incident_status','active') and sev == 'major' %}
                deep-orange
              {% elif is_state('sensor.hioc_incident_status','active') and sev == 'warning' %}
                amber
              {% else %}
                green
              {% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: markdown
            content: >-
              {% if is_state('sensor.hioc_incident_status','active') %}

              ## Current Incident

              **{{ states('sensor.hioc_incident_severity') | title }} · {{ state_attr('sensor.hioc_incident_active','phase') | default('active') | title }}**

              **Title**  
              {{ states('sensor.hioc_incident_active') }}

              **Root Cause**  
              {{ state_attr('sensor.hioc_incident_active','root_cause') }}

              **Confidence**  
              {{ state_attr('sensor.hioc_incident_active','confidence_percent') }}%

              **Impact**  
              {{ state_attr('sensor.hioc_incident_active','impact') }}

              **Current Value**  
              {{ states('sensor.hioc_incident_current_value') }}

              **Evidence**  
              {% set evidence = state_attr('sensor.hioc_incident_active','evidence') %}
              {% if evidence is iterable and evidence is not string %}
              {% for item in evidence %}✓ {{ item }}  
              {% endfor %}
              {% else %}
              {{ states('sensor.hioc_incident_reason') }}
              {% endif %}

              **Recommendation**  
              {{ states('sensor.hioc_incident_recommendation') }}

              **Started**  
              {{ states('sensor.hioc_incident_started') }}

              {% else %}

              ## Incident Center

              🟢 **No active incident**

              **Engine**  
              v{{ state_attr('sensor.hioc_incident_summary','engine_version') | default('1.2.0') }} · {{ states('sensor.hioc_engine_status') | title }}

              **Signals Detected**  
              {{ state_attr('sensor.hioc_incident_summary','signals_detected') | default(0) }}

              **Last Timeline Event**  
              {{ states('sensor.hioc_latest_timeline_event') }}

              **Incident History**  
              {{ states('sensor.hioc_incident_history_count') }} recorded incidents

              {% endif %}
            card_mod:
              style: |
                ha-card {
                  min-height: 320px;
                  border-radius: 24px;
                  padding: 18px;
                  background: rgba(18,31,45,0.92);
                }
                ha-markdown {
                  line-height: 1.28;
                }
            grid_options:
              columns: 12
              rows: 8
          - type: custom:mushroom-template-card
            primary: Internet Score
            secondary: >-
              {{ states('sensor.hioc_internet_score') }}% · {{
              states('sensor.hioc_internet_intelligence') }}
            icon: mdi:web-check
            icon_color: >-
              {% if states('sensor.hioc_internet_score') | int(0) >= 95
              %}green{% elif states('sensor.hioc_internet_score') | int(0) >= 80
              %}amber{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: DNS Score
            secondary: >-
              {{ states('sensor.hioc_dns_score') }}% · {{
              states('sensor.hioc_dns_intelligence') }}
            icon: mdi:dns
            icon_color: >-
              {% if states('sensor.hioc_dns_score') | int(0) >= 95 %}green{%
              elif states('sensor.hioc_dns_score') | int(0) >= 80 %}amber{% else
              %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: Power Score
            secondary: >-
              {{ states('sensor.hioc_power_score') }}% · {{
              states('sensor.hioc_ups_summary') }}
            icon: mdi:power-plug-battery
            icon_color: >-
              {% if states('sensor.hioc_power_score') | int(0) >= 95 %}green{%
              elif states('sensor.hioc_power_score') | int(0) >= 80 %}amber{%
              else %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: Services Score
            secondary: >-
              {{ states('sensor.hioc_services_score') }}% · MQTT {{
              states('sensor.hioc_mqtt_intelligence') }}
            icon: mdi:server-network
            icon_color: >-
              {% if states('sensor.hioc_services_score') | int(0) >= 95
              %}green{% elif states('sensor.hioc_services_score') | int(0) >= 80
              %}amber{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.hioc_noc_summary') }}"
            secondary: >-
              {{ state_attr('sensor.hioc_noc_summary', 'status') }} · Latest: {{
              states('input_text.hioc_latest_event') }}
            icon: mdi:monitor-dashboard
            icon_color: >-
              {% if states('sensor.hioc_noc_summary') == 'Operational' %}green{%
              else %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: markdown
            content: >-
              ## Score Breakdown


              {% set internet = states('sensor.hioc_internet_score') | int(0) %}

              {% set dns = states('sensor.hioc_dns_score') | int(0) %}

              {% set power = states('sensor.hioc_power_score') | int(0) %}

              {% set services = states('sensor.hioc_services_score') | int(0) %}

              {% set internet_quality = states('sensor.hioc_internet_quality')
              %}

              {% set dns_quality = states('sensor.hioc_dns_quality') %}

              {% set mqtt_quality = states('sensor.hioc_mqtt_quality') %}

              {% set ups_summary = states('sensor.hioc_ups_summary') %}


              🟢 **Internet**  

              {{ internet }} · {{ internet_quality }}


              🟢 **DNS**  

              {{ dns }} · {{ dns_quality }}


              🟢 **UPS**  

              {{ power }} · {{ ups_summary }}


              🟢 **Services**  

              {{ services }} · Healthy


              🟢 **MQTT**  

              {{ mqtt_quality }}
            card_mod:
              style: |
                ha-card {
                  min-height: 230px;
                  border-radius: 24px;
                  padding: 18px;
                  background: rgba(18,31,45,0.92);
                }
                ha-markdown {
                  line-height: 1.28;
                }
            grid_options:
              columns: 12
              rows: 6
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Live Trend Strip
            subtitle: >-
              Compact 2-column heartbeat across internet, DNS, gateway, MQTT,
              UPS, WAN, and hosts
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mini-graph-card
                name: Internet Latency
                entities:
                  - sensor.pi4_network_probe_average_internet_latency
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:speedometer
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: Packet Loss
                entities:
                  - sensor.pi4_network_probe_average_packet_loss
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:chart-line
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: DNS Latency
                entities:
                  - sensor.pi4_network_probe_pi_hole_dns_latency
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:dns
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: Gateway Latency
                entities:
                  - sensor.pi4_network_probe_gateway_latency
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:router-network
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: Pi4 Temperature
                entities:
                  - sensor.pi4_infrastructure_temperature
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:thermometer
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: Pi5 CPU
                entities:
                  - sensor.system_monitor_processor_use
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:cpu-64-bit
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: MQTT Latency
                entities:
                  - sensor.pi4_network_probe_mqtt_publish_duration
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:message-fast
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: UPS Load
                entities:
                  - entity: sensor.ups1_load
                    name: UPS1
                  - entity: sensor.ups2_load
                    name: UPS2
                hours_to_show: 24
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:power-plug-battery
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: WAN Download
                entities:
                  - sensor.huawei_igd_download_speed
                hours_to_show: 12
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:download-network
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
              - type: custom:mini-graph-card
                name: WAN Upload
                entities:
                  - sensor.huawei_igd_upload_speed
                hours_to_show: 12
                points_per_hour: 4
                show:
                  fill: true
                  extrema: true
                  icon: true
                icon: mdi:upload-network
                height: 92
                card_mod:
                  style: |2-

                              ha-card {
                                margin: 6px;
                                border-radius: 18px;
                              }
                            
            card_mod:
              style: |2-

                          ha-card {
                            background: transparent;
                            box-shadow: none;
                            padding: 8px 8px 64px 8px;
                            margin-bottom: 64px;
                          }
                        
            grid_options:
              columns: 12
              rows: 19
          - type: markdown
            content: <br>
            grid_options:
              columns: full
              rows: auto
            text_only: true
            card_mod:
              style: |
                ha-card {
                  min-height: 1px;
                  background: transparent;
                  box-shadow: none;
                  border: none;
                  padding: 0;
                  margin: 0;
                }
                ha-markdown {
                  display: block;
                  min-height: 1px;
                }
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Quick Metrics
            subtitle: Fast-read infrastructure ribbon
          - type: custom:mushroom-template-card
            primary: WAN IP
            secondary: >-
              {{ states('sensor.pi4_network_probe_public_ip') }} · Outages {{
              states('sensor.pi4_network_probe_internet_outage_count') }}
            icon: mdi:ip-network
            icon_color: >-
              {% if states('sensor.pi4_network_probe_internet_health') ==
              'healthy' %}green{% else %}amber{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: Pi-hole Live
            secondary: >-
              {{ states('sensor.pi_hole_dns_queries_today') }} queries · {{
              states('sensor.pi_hole_ads_percentage_blocked_today') | float(0) |
              round(1) }}% blocked · {{ states('sensor.pi_hole_seen_clients') }}
              clients
            icon: mdi:pi-hole
            icon_color: >-
              {% if is_state('binary_sensor.pi_hole_status','on') %}green{% else
              %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: UPS
            secondary: >-
              UPS1 {{ states('sensor.pi4_infrastructure_ups1_battery') }}% ·
              UPS2 {{ states('sensor.pi4_infrastructure_ups2_battery') }}%
            icon: mdi:power-plug-battery
            icon_color: green
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: Pi 4
            secondary: >-
              {{ states('sensor.pi4_infrastructure_temperature') }}°C · RAM {{
              states('sensor.pi4_infrastructure_memory_usage') }}% · Disk {{
              states('sensor.pi4_infrastructure_disk_usage') }}%
            icon: mdi:raspberry-pi
            icon_color: green
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: Pi 5
            secondary: >-
              CPU {{ states('sensor.system_monitor_processor_use') }}% · RAM {{
              states('sensor.system_monitor_memory_usage') }}% · {{
              states('sensor.system_monitor_processor_temperature') }}°C
            icon: mdi:home-assistant
            icon_color: green
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
          - type: custom:mushroom-template-card
            primary: Network
            secondary: >-
              Latency {{
              states('sensor.pi4_network_probe_average_internet_latency') |
              float(0) | round(1) }} ms · Loss {{
              states('sensor.pi4_network_probe_average_packet_loss') | float(0)
              | round(1) }}% · Jitter {{
              states('sensor.pi4_network_probe_internet_jitter') | float(0) |
              round(1) }} ms
            icon: mdi:wan
            icon_color: >-
              {% if states('sensor.pi4_network_probe_internet_health') ==
              'healthy' %}green{% elif
              states('sensor.pi4_network_probe_internet_health') == 'degraded'
              %}amber{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
            grid_options:
              columns: 12
              rows: 1
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Critical Status
            subtitle: Systems that must stay healthy
          - type: custom:mushroom-template-card
            primary: Internet
            secondary: >-
              {{ states('sensor.pi4_network_probe_internet_health') | title }} ·
              {{ states('sensor.pi4_network_probe_average_internet_latency') |
              float(0) | round(1) }} ms · {{
              states('sensor.pi4_network_probe_average_packet_loss') | float(0)
              | round(1) }}% loss
            icon: mdi:web-check
            icon_color: >-
              {% if states('sensor.pi4_network_probe_internet_health') ==
              'healthy' %}green{% elif
              states('sensor.pi4_network_probe_internet_health') == 'degraded'
              %}amber{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: DNS
            secondary: >-
              Pi-hole {{ states('sensor.pi4_network_probe_pi_hole_dns_latency')
              }} ms · Cloudflare {{
              states('sensor.pi4_network_probe_cloudflare_dns_latency') }} ms ·
              {{ states('sensor.pi_hole_dns_queries_frequency') }} q/min
            icon: mdi:dns
            icon_color: >-
              {% if states('sensor.pi4_network_probe_pi_hole_dns_latency') |
              float(999) < 50 %}green{% elif
              states('sensor.pi4_network_probe_pi_hole_dns_latency') |
              float(999) < 150 %}amber{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Power
            secondary: >-
              UPS1 {{ states('sensor.pi4_infrastructure_ups1_battery') }}% ·
              UPS2 {{ states('sensor.pi4_infrastructure_ups2_battery') }}%
            icon: mdi:power-plug
            icon_color: green
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Cameras
            secondary: >-
              Frigate stopped · go2rtc {{ 'running' if
              is_state('binary_sensor.go2rtc_running','on') else 'stopped' }}
            icon: mdi:cctv
            icon_color: grey
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Probe
            secondary: >-
              Last update {{
              states('sensor.pi4_network_probe_network_probe_last_update') }} ·
              MQTT {{ states('sensor.pi4_network_probe_mqtt_publish_duration')
              }} ms
            icon: mdi:radar
            icon_color: >-
              {% if states('sensor.pi4_network_probe_mqtt_publish_failures') |
              int(0) == 0 %}green{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Service Health
            subtitle: Infrastructure services and add-ons
          - type: custom:mushroom-template-card
            primary: Pi-hole FTL
            secondary: "{{ states('sensor.pi4_infrastructure_pi_hole_ftl_status') }}"
            icon: mdi:shield-check
            icon_color: >-
              {% if states('sensor.pi4_infrastructure_pi_hole_ftl_status') in
              ['on','On'] %}green{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: NUT Server
            secondary: "{{ states('sensor.pi4_infrastructure_nut_server_status') }}"
            icon: mdi:server
            icon_color: >-
              {% if states('sensor.pi4_infrastructure_nut_server_status') in
              ['on','On'] %}green{% else %}red{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: MQTT Broker
            secondary: >-
              {% set s = states('binary_sensor.mosquitto_broker_running') %}{%
              set cpu = states('sensor.mosquitto_broker_cpu_percent') %}{% set
              mem = states('sensor.mosquitto_broker_memory_percent') %}{% set
              ver = states('sensor.mosquitto_broker_version') %}{% if s in
              ['on','On'] %}Running{% else %}Stopped{% endif %} · CPU {{ cpu }}%
              · Mem {{ mem }}% · v{{ ver }}
            icon: mdi:message-processing
            icon_color: >-
              {% if states('binary_sensor.mosquitto_broker_running') in
              ['on','On'] %}green{% else %}grey{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Ring-MQTT
            secondary: >-
              {% set s =
              states('binary_sensor.ring_mqtt_with_video_streaming_running')
              %}{% set cpu =
              states('sensor.ring_mqtt_with_video_streaming_cpu_percent') %}{%
              set mem =
              states('sensor.ring_mqtt_with_video_streaming_memory_percent')
              %}{% set ver =
              states('sensor.ring_mqtt_with_video_streaming_version') %}{% if s
              in ['on','On'] %}Running{% else %}Stopped{% endif %} · CPU {{ cpu
              }}% · Mem {{ mem }}% · v{{ ver }}
            icon: mdi:doorbell-video
            icon_color: >-
              {% if
              states('binary_sensor.ring_mqtt_with_video_streaming_running') in
              ['on','On'] %}green{% else %}grey{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Z-Wave JS
            secondary: >-
              {% set s = states('binary_sensor.z_wave_js_running') %}{% set cpu
              = states('sensor.z_wave_js_cpu_percent') %}{% set mem =
              states('sensor.z_wave_js_memory_percent') %}{% set ver =
              states('sensor.z_wave_js_version') %}{% if s in ['on','On']
              %}Running{% else %}Stopped{% endif %} · CPU {{ cpu }}% · Mem {{
              mem }}% · v{{ ver }}
            icon: mdi:z-wave
            icon_color: >-
              {% if states('binary_sensor.z_wave_js_running') in ['on','On']
              %}green{% else %}grey{% endif %}
            layout: horizontal
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Matter Server
            secondary: >-
              {% set s = states('binary_sensor.matter_server_running') %}{% set
              cpu = states('sensor.matter_server_cpu_percent') %}{% set mem =
              states('sensor.matter_server_memory_percent') %}{% set ver =
